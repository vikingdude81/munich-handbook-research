// Scytale cipher — columnar transposition (Spartan rod cipher)
// Porta describes this in De Occultis Chunk 019
function scytaleCipher(text, rods, encrypt) {
  const clean = text.toUpperCase().replace(/[^A-Z]/g, "");
  if (!clean) return "";
  if (encrypt) {
    // Write across rows of width=rods, read down columns
    const cols = rods;
    const rows = Math.ceil(clean.length / cols);
    const padded = clean.padEnd(rows * cols, "X");
    let out = "";
    for (let c = 0; c < cols; c++) {
      for (let r = 0; r < rows; r++) {
        out += padded[r * cols + c];
      }
    }
    return out;
  } else {
    // Reverse: read down rows of width=ceil(len/rods)
    const rows = rods;
    const cols = Math.ceil(clean.length / rows);
    const padded = clean.padEnd(rows * cols, "X");
    let out = "";
    for (let c = 0; c < cols; c++) {
      for (let r = 0; r < rows; r++) {
        out += padded[r * cols + c];
      }
    }
    return out.replace(/X+$/, "");
  }
}

// Zodiac Numeric cipher — each letter becomes zodiac sign + position number
// Based on Porta p.663: "twelve signs assigned numbers"
function zodiacNumeric(text, encrypt) {
  if (encrypt) {
    return text.toUpperCase().split("").map(c => {
      if (!/[A-Z]/.test(c)) return c;
      const idx = ALPHABET.indexOf(c); // 0-25
      const sign = ZODIAC[idx % 12];
      const pos = Math.floor(idx / 12) + 1; // 1, 2, or 3
      return sign.s + pos;
    }).join(" ");
  } else {
    // Parse tokens like ♈1 ♉2 etc.
    const signMap = {};
    ZODIAC.forEach((z, i) => { signMap[z.s] = i; });
    const tokens = text.trim().split(/\s+/);
    return tokens.map(t => {
      // Find zodiac symbol (1-3 chars) + number
      for (const [sym, si] of Object.entries(signMap)) {
        if (t.startsWith(sym)) {
          const pos = parseInt(t.slice(sym.length)) - 1;
          const idx = si + pos * 12;
          if (idx < 26) return ALPHABET[idx];
        }
      }
      return t;
    }).join("");
  }
}

// Null cipher — hide message in the first letter of each word
// Porta describes this as "acrostic concealment" in De Occultis
function nullCipherEncode(message) {
  // For each letter in message, generate a filler word starting with that letter
  const FILLERS = {
    A:["All","And","As","At","After","Among","Above","Against"],

    H:["He","Has","His","Her","Here","Holy","High","Hold","Hidden"],
    I:["In","Is","If","Its","Into","Inner","Indeed","Inscribed"],
    J:["Just","Join","Journey","Judge","Jupiter"],
    K:["Keep","Known","King","Knowledge","Key"],
    L:["Let","Like","Long","Light","Lord","Luna","Loose","Lead"],
    M:["My","More","Most","Must","Many","Made","Mark","Moon","Mars"],
    N:["Not","Now","No","Near","Night","Name","Noble","Neither"],
    O:["Of","On","Or","One","Our","Only","Open","Over","Old"],
    P:["Put","Per","Part","Path","Power","Place","Passes","Planet"],
    Q:["Quite","Queen","Quick","Quiet"],
    R:["Read","Right","Runs","Revealed","Ring","Reach","Remain"],
    S:["So","Said","Some","Such","Send","Sign","Sun","Saturn","Spirit"],
    T:["The","That","This","Then","To","Through","True","Take","Time"],
    U:["Upon","Under","Until","Up","Unless","Unseen","United"],
    V:["Very","Via","Voice","Virtue","Veiled","Venus","Vast"],
    W:["With","When","While","Was","Will","Within","Without","Word"],
    X:["Xerxes","XI","XII"],
    Y:["Yet","You","Your","Yonder","Years"],
    Z:["Zazel","Zeal","Zone","Zenith"],
  };
  const words = message.toUpperCase().split("").map((c, i) => {
    if (!/[A-Z]/.test(c)) return c;
    const opts = FILLERS[c] || [c];
    return opts[i % opts.length];
  });
  return words.join(" ");
}

function nullCipherDecode(text) {
  return text.split(/\s+/).map(w => w[0] || "").join("").toUpperCase();
}

/* ═══ CIPHER ENGINES ═══ */
function caesarShift(text, shift, encrypt) {
  return text.toUpperCase().split("").map(c => {
    if (!/[A-Z]/.test(c)) return c;
    const idx = ALPHABET.indexOf(c);
    const newIdx = encrypt ? (idx + shift) % 26 : (idx - shift + 26) % 26;
    return ALPHABET[newIdx];
  }).join("");
}

function reversedAlphabet(text, encrypt) {
  // Saturn: A↔Z, B↔Y, etc. — same in both directions (involution)
  return text.toUpperCase().split("").map(c => {
    if (!/[A-Z]/.test(c)) return c;
    return ALPHABET[25 - ALPHABET.indexOf(c)];
  }).join("");
}

function mirrorCipher(text, encrypt) {
  // Moon: shift by 13 (ROT13-style)
  return caesarShift(text, 13, true);
}

function vowelInterposition(text, encrypt) {
  // Venus: consonants hide behind vowels
  const vowels = "AEIOU";
  if (encrypt) {
    return text.toUpperCase().split("").map(c => {
      if (!/[A-Z]/.test(c)) return c;
      if (vowels.includes(c)) return c;
      // Shift consonant: replace with next vowel + original
      const vi = Math.floor(ALPHABET.indexOf(c) * 5 / 26);
      return vowels[vi] + c;
    }).join("");
  } else {
    // Decrypt: remove interposed vowels
    let out = "", i = 0, arr = text.toUpperCase().split("");
    while (i < arr.length) {
      if (vowels.includes(arr[i]) && i+1 < arr.length && !vowels.includes(arr[i+1])) {
        out += arr[i+1]; i += 2;
      } else { out += arr[i]; i++; }
    }
    return out;
  }
}

function applyPlanetCipher(planet, text, encrypt) {
  switch(planet.name) {
    case "Saturn":  return reversedAlphabet(text, encrypt);
    case "Jupiter": return caesarShift(text, 4, encrypt);
    case "Mars":    return caesarShift(text, 5, encrypt);
    case "Sun":     return caesarShift(text, 6, encrypt);
    case "Venus":   return vowelInterposition(text, encrypt);
    case "Mercury": return caesarShift(text, planet.rotation % 26, encrypt);
    case "Moon":    return mirrorCipher(text, encrypt);
    default:        return text;
  }
}

function toMythTokens(text) {
  return text.toUpperCase().split("").map(c => MYTH_TOKENS[c] || c).join(" · ");
}

function fromMythTokens(text) {
  const rev = Object.fromEntries(Object.entries(MYTH_TOKENS).map(([k,v]) => [v.toLowerCase(), k]));
  return text.split(/[\s·]+/).map(w => rev[w.toLowerCase()] || w).join("");
}

function CipherWheel({ planet, outerRotation, onDrag, isDragging }) {
  const svgRef = useRef(null);
  const sz = 380, cx = sz/2, cy = sz/2;
  const outerR = 170, innerR = 115, hubR = 48;
  const outerLetters = ALPHABET; // fixed outer ring = plaintext
  const innerLetters = ALPHABET; // inner ring rotates = cipher alphabet

  // Tick marks
  const ticks = Array.from({length:26}, (_,i) => {
    const a = (i * 360/26 - 90) * Math.PI/180;
    return <line key={"tick"+i}
      x1={cx + (outerR-14)*Math.cos(a)} y1={cy + (outerR-14)*Math.sin(a)}
      x2={cx + (outerR-6)*Math.cos(a)}  y2={cy + (outerR-6)*Math.sin(a)}
      stroke="#5a4a2a" strokeWidth={i%13===0 ? 1.5 : 0.6}/>;
  });

  // Zodiac symbols on outermost ring
  const zodTicks = Array.from({length:12}, (_,i) => {
    const a = (i * 30 - 90) * Math.PI/180;
    const zod = ZODIAC[i];
    return <text key={"z"+i}
      x={cx + (outerR+14)*Math.cos(a)}
      y={cy + (outerR+14)*Math.sin(a)}
      textAnchor="middle" dominantBaseline="middle"
      fontSize="10" fill="#5a3a18" opacity="0.7"
      transform={`rotate(${i*30}, ${cx + (outerR+14)*Math.cos(a)}, ${cy + (outerR+14)*Math.sin(a)})`}>
      {zod.s}
    </text>;
  });

  // Handle drag to rotate inner ring
  const dragStart = useRef(null);
  const startRot = useRef(0);

  function getAngle(e, svg) {
    const rect = svg.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = clientX - rect.left - rect.width/2;
    const y = clientY - rect.top - rect.height/2;
    return Math.atan2(y, x) * 180 / Math.PI;
  }

  function onMouseDown(e) {
    dragStart.current = getAngle(e, svgRef.current);
    startRot.current = outerRotation;
    e.preventDefault();
  }

  function onMouseMove(e) {
    if (dragStart.current === null) return;
    const angle = getAngle(e, svgRef.current);
    const delta = angle - dragStart.current;
    onDrag((startRot.current + delta + 360) % 360);
  }

  function onMouseUp() { dragStart.current = null; }

  useEffect(() => {
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);
    window.addEventListener("touchmove", onMouseMove, {passive:false});
    window.addEventListener("touchend", onMouseUp);
    return () => {
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
      window.removeEventListener("touchmove", onMouseMove);
      window.removeEventListener("touchend", onMouseUp);
    };
  });

  const innerShift = Math.round(outerRotation / (360/26)) % 26;

  return (
    <svg ref={svgRef} viewBox={`0 0 ${sz} ${sz}`} style={{width:"100%",maxWidth:400,cursor:isDragging?"grabbing":"default",userSelect:"none"}}
      onMouseDown={onMouseDown} onTouchStart={onMouseDown}>
      <defs>
        <radialGradient id="hubGrad">
          <stop offset="0%" stopColor={planet.color} stopOpacity="0.6"/>
          <stop offset="100%" stopColor={planet.color} stopOpacity="0.1"/>
        </radialGradient>
        <filter id="parchAge">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <radialGradient id="bgGrad">
          <stop offset="0%" stopColor="#d4b878"/>
          <stop offset="100%" stopColor="#b89050"/>
        </radialGradient>
      </defs>

      {/* Background */}
      <circle cx={cx} cy={cy} r={sz/2-2} fill="url(#bgGrad)" stroke="#5a3a18" strokeWidth="2"/>

      {/* Outer zodiac ring */}
      <circle cx={cx} cy={cy} r={outerR+24} fill="none" stroke="#5a4a2a" strokeWidth="1.5"/>
      <circle cx={cx} cy={cy} r={outerR+4}  fill="none" stroke="#5a4a2a" strokeWidth="0.5"/>
      {zodTicks}

      {/* Outer fixed ring — PLAINTEXT */}
      <circle cx={cx} cy={cy} r={outerR} fill="#c8a860" stroke="#5a4a2a" strokeWidth="2"/>
      <circle cx={cx} cy={cy} r={outerR-26} fill="none" stroke="#5a4a2a" strokeWidth="0.5"/>
      {ticks}
      {outerLetters.map((letter, i) => {
        const a = (i * 360/26 - 90) * Math.PI/180;
        const lr = outerR - 14;
        return (
          <text key={"ol"+i}
            x={cx + lr*Math.cos(a)} y={cy + lr*Math.sin(a)}
            textAnchor="middle" dominantBaseline="middle"
            fontSize="13" fontWeight="600" fill="#2a1808"
            transform={`rotate(${i*360/26}, ${cx + lr*Math.cos(a)}, ${cy + lr*Math.sin(a)})`}>
            {letter}
          </text>
        );
      })}
      <text x={cx} y={cy - outerR + 6} textAnchor="middle" fontSize="7" fill="#5a3a18" opacity="0.7">PLAINTEXT</text>

      {/* Inner rotating ring — CIPHER */}
      <g transform={`rotate(${outerRotation}, ${cx}, ${cy})`}>
        <circle cx={cx} cy={cy} r={innerR} fill="#b89050" stroke="#5a4a2a" strokeWidth="2.5"/>
        <circle cx={cx} cy={cy} r={innerR-28} fill="none" stroke="#5a4a2a" strokeWidth="0.5"/>
        {innerLetters.map((letter, i) => {
          const a = (i * 360/26 - 90) * Math.PI/180;
          const lr = innerR - 14;
          return (
            <text key={"il"+i}
              x={cx + lr*Math.cos(a)} y={cy + lr*Math.sin(a)}
              textAnchor="middle" dominantBaseline="middle"
              fontSize="13" fontWeight="600" fill={planet.color}
              style={{filter:"drop-shadow(0 0 2px rgba(0,0,0,0.4))"}}
              transform={`rotate(${-(outerRotation) + i*360/26}, ${cx + lr*Math.cos(a)}, ${cy + lr*Math.sin(a)})`}>
              {letter}
            </text>
          );
        })}
        {/* Drag handle hint arrows */}
        <path d={`M ${cx-10} ${cy-innerR+8} A 10 10 0 0 1 ${cx+10} ${cy-innerR+8}`}
          fill="none" stroke="#5a4a2a" strokeWidth="1" opacity="0.4"/>
      </g>

      {/* Hub */}
      <circle cx={cx} cy={cy} r={hubR} fill="url(#hubGrad)" stroke="#5a4a2a" strokeWidth="1.5"/>
      <text x={cx} y={cy-8} textAnchor="middle" fontSize="22" fill={planet.color}>{planet.sym}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fontStyle="italic" fill="#3a2810" opacity="0.8">{planet.name}</text>
      <text x={cx} y={cy+22} textAnchor="middle" fontSize="7" fill="#3a2810" opacity="0.5">shift·{innerShift}</text>

      {/* Pointer / indicator at top */}
      <path d={`M ${cx-6} ${cy-outerR-28} L ${cx} ${cy-outerR-4} L ${cx+6} ${cy-outerR-28} Z`}
        fill="#3a2810" opacity="0.7"/>

      {/* Label */}
      <text x={cx} y={cy + innerR - 8} textAnchor="middle" fontSize="7" fill="#5a3a18" opacity="0.7">CIPHER · DRAG TO ROTATE</text>
    </svg>
  );
}

/* ═══ CIPHER MAP DISPLAY ═══ */
function CipherMapTable({ planet, shift }) {
  const shifted = ALPHABET.map((_, i) => {
    switch(planet.name) {
      case "Saturn":  return ALPHABET[25 - i];
      case "Moon":    return ALPHABET[(i + 13) % 26];
      case "Jupiter": return ALPHABET[(i + 4) % 26];
      case "Mars":    return ALPHABET[(i + 5) % 26];
      case "Sun":     return ALPHABET[(i + 6) % 26];
      case "Mercury": return ALPHABET[(i + 11) % 26];
      case "Venus":   return ALPHABET[(i + 9) % 26];
      default:        return ALPHABET[(i + shift) % 26];
    }
  });

  return (
    <div style={{overflowX:"auto", marginTop:8}}>
      <table style={{borderCollapse:"collapse", fontSize:11, width:"100%"}}>
        <tbody>
          <tr>
            <td style={{padding:"2px 6px", fontWeight:"bold", color:"#3a2810", opacity:0.6, fontSize:10}}>Plain</td>
            {ALPHABET.map(l => (
              <td key={l} style={{padding:"3px 4px", textAlign:"center", fontWeight:"bold", color:"#2a1808", borderBottom:"1px solid #9a7840"}}>{l}</td>
            ))}
          </tr>
          <tr>
            <td style={{padding:"2px 6px", fontWeight:"bold", color:planet.color, fontSize:10}}>Cipher</td>
            {shifted.map((l, i) => (
              <td key={i} style={{padding:"3px 4px", textAlign:"center", fontWeight:"bold", color:planet.color, background:i%2===0?"rgba(0,0,0,0.04)":"transparent"}}>{l}</td>
            ))}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

                ))}
              </div>
              <textarea value={zodiacIn} onChange={e => setZodiacIn(e.target.value)}
                placeholder={zodiacDir==="encrypt" ? "BELLA FORTISSIME GESTA SVNT" : "♉1 ♋1 ♌1 ..."}
                rows={3} style={inputStyle}/>
              <div style={{textAlign:"center", margin:"8px 0", color:planet.color, fontSize:16}}>↓</div>
              <div style={{...inputStyle, minHeight:60, background:"rgba(42,24,8,0.1)", fontWeight:"bold",
                fontSize:14, color:planet.color, whiteSpace:"pre-wrap", wordBreak:"break-all", letterSpacing:"0.05em"}}>
                {zodiacOut || <span style={{opacity:0.4,fontWeight:"normal",fontSize:12}}>Output will appear here…</span>}
              </div>
            </div>

            {/* ── NULL CIPHER ── */}
            <div style={{...panelStyle}}>
              <div style={{fontSize:13, fontWeight:"bold", color:"#3a2810", marginBottom:4}}>🔐 Null Cipher — Acrostic Concealment</div>
              <div style={{fontSize:11, lineHeight:1.7, color:"#3a2810", marginBottom:8}}>
                <em>"Conceal the message in the first letters of innocent words — to the uninitiated it reads as pious text."</em>
                <span style={{color:"#8a7050", fontSize:10}}> — De Occultis, Chunk 015</span><br/>
                Encode a message as an acrostic. The ciphertext reads like prayer or scholarship; only the first letter of each word matters.
              </div>
              <div style={{display:"flex", gap:0, marginBottom:8, border:"1px solid rgba(58,40,16,0.3)", borderRadius:3, overflow:"hidden"}}>
                {[["encrypt","Hide message ↓"],["decrypt","Extract first letters ↑"]].map(([m, label]) => (
                  <button key={m} onClick={() => { setNullDir(m); setNullIn(""); }} style={{
                    flex:1, padding:"7px", fontSize:12,
                    background: nullDir===m ? "#3a2810" : "transparent",
                    color: nullDir===m ? "#c4a868" : "#3a2810",
                    border:"none", fontFamily:"inherit", cursor:"pointer",
                  }}>{label}</button>
                ))}
              </div>
              <textarea value={nullIn} onChange={e => setNullIn(e.target.value)}
                placeholder={nullDir==="encrypt" ? "SECRET" : "Paste acrostic text to decode..."}
                rows={3} style={inputStyle}/>
              <div style={{textAlign:"center", margin:"8px 0", color:planet.color, fontSize:16}}>↓</div>
              <div style={{...inputStyle, minHeight:80, background:"rgba(42,24,8,0.1)", fontStyle:"italic",
                fontSize:12, color:"#3a2810", whiteSpace:"pre-wrap", wordBreak:"break-word", lineHeight:1.8}}>
                {nullOut || <span style={{opacity:0.4,fontStyle:"normal",fontSize:12}}>Output will appear here…</span>}
              </div>
              {nullOut && nullDir==="encrypt" && (
                <div style={{fontSize:10, color:planet.color, marginTop:6, fontStyle:"italic"}}>
                  First letters spell: <strong>{nullOut.split(" ").map(w=>w[0]||" ").join("")}</strong>
                </div>
              )}
            </div>

          </div>
        )}

        {activeTab === "tokens" && (
          <div style={{display:"flex", flexDirection:"column", gap:12}}>
            <div style={{...panelStyle}}>
              <div style={{fontSize:13, fontWeight:"bold", color:"#3a2810", marginBottom:6}}>Mythological Cipher Tokens</div>
              <div style={{fontSize:11, lineHeight:1.7, color:"#3a2810", marginBottom:12}}>
                From De Occultis p.157–158: <em>"I will call Apollo the King, Scorpius the Scorpion."</em><br/>
                Porta assigned each letter a mythological figure — so a cipher text reads as a list of gods, heroes, and creatures. To an outsider it is theology. To the initiated it is a message.
              </div>
              <WoodcutDivider/>

              {/* Token table */}
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(120px,1fr))", gap:4, marginBottom:12}}>
                {ALPHABET.map(l => (
                  <div key={l} style={{
                    background:"rgba(42,24,8,0.08)", borderRadius:3, padding:"4px 8px",
                    display:"flex", alignItems:"center", gap:6, fontSize:11,
                  }}>
                    <span style={{fontWeight:"bold", color:planet.color, width:14}}>{l}</span>
                    <span style={{color:"#3a2810", fontStyle:"italic"}}>{MYTH_TOKENS[l]}</span>
                  </div>
                ))}
              </div>
              <WoodcutDivider/>

              {/* Encode/decode with myth tokens */}
              <div style={{display:"flex", gap:0, marginBottom:10, border:"1px solid rgba(58,40,16,0.3)", borderRadius:3, overflow:"hidden"}}>
                {[["myth_enc","Text → Tokens"],["myth_dec","Tokens → Text"]].map(([m, label]) => (
                  <button key={m} onClick={() => { setMode(m); setMythInput(""); setMythOutput(""); }} style={{
                    flex:1, padding:"7px", fontSize:12,
                    background: mode===m ? "#3a2810" : "transparent",
                    color: mode===m ? "#c4a868" : "#3a2810",
                    border:"none", fontFamily:"inherit", cursor:"pointer",
                  }}>{label}</button>
                ))}
              </div>

              <textarea
                value={mythInput}
                onChange={e => setMythInput(e.target.value)}
                placeholder={mode==="myth_enc" ? "Enter text to encode as myth tokens..." : "Enter token names separated by · or spaces..."}
                rows={3}
                style={inputStyle}
              />
              <div style={{textAlign:"center", margin:"8px 0", fontSize:16, color:planet.color}}>↓</div>
              <div style={{
                ...inputStyle, minHeight:60, background:"rgba(42,24,8,0.1)",
                fontWeight:"bold", fontSize:13, color:planet.color,
                whiteSpace:"pre-wrap", wordBreak:"break-word",
              }}>
                {mythOutput || <span style={{opacity:0.4, fontWeight:"normal", fontSize:12}}>Output will appear here…</span>}
              </div>
            </div>
          </div>
        )}

        {activeTab === "crossref" && (
          <div style={{display:"flex", flexDirection:"column", gap:12}}>
            <div style={{...panelStyle}}>
              <div style={{fontSize:13, fontWeight:"bold", color:"#3a2810", marginBottom:4}}>Cross-Source Connections</div>
              <div style={{fontSize:11, lineHeight:1.7, color:"#3a2810"}}>
                Entities, materials, and concepts appearing in <strong>both</strong> <em>De Occultis Literarum Notis</em> (Porta, 1592) <strong>and</strong> the <em>Munich Handbook of Necromancy</em> (15th c.) — two texts that never cite each other, yet share a common occult substrate.
              </div>
            </div>
            {CROSS_REFS.map(cat => (
              <div key={cat.category} style={{...panelStyle}}>
                <div style={{fontSize:11, letterSpacing:"0.12em", color:"#5a3a18", marginBottom:10}}>
                  {cat.icon} {cat.category.toUpperCase()}
                </div>
                {cat.items.map((item, ii) => {
                  const key = cat.category + ii;
                  const expanded = expandedRef === key;
                  return (
                    <div key={ii} style={{
                      marginBottom:10, borderRadius:3, overflow:"hidden",
                      border:"1px solid rgba(90,58,24,0.25)",
                    }}>
                      {/* Header */}
                      <button onClick={() => setExpandedRef(expanded ? null : key)} style={{
                        width:"100%", textAlign:"left", padding:"8px 10px",
                        background: expanded ? "rgba(42,24,8,0.15)" : "rgba(180,148,72,0.2)",
                        border:"none", cursor:"pointer", fontFamily:"inherit",
                        display:"flex", alignItems:"center", gap:8,
                      }}>
                        <span style={{fontSize:13, fontWeight:"bold", color:"#2a1808", flex:1}}>{item.entity}</span>
                        <span style={{fontSize:10, color:"#8a6a40"}}>{expanded ? "▲ less" : "▼ more"}</span>
                      </button>
                      {/* Two-column sources */}
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:0}}>
                        <div style={{padding:"8px 10px", borderRight:"1px solid rgba(90,58,24,0.2)", background:"rgba(138,105,64,0.08)"}}>
                          <div style={{fontSize:9, letterSpacing:"0.15em", color:"#5a3a18", marginBottom:4}}>DE OCCULTIS</div>
                          <div style={{fontSize:11, color:"#2a1808", fontStyle:"italic", lineHeight:1.5}}>{item.deOccultis.text}</div>
                          <div style={{fontSize:9, color:"#8a7050", marginTop:4}}>{item.deOccultis.ref}</div>
                          <div style={{
                            marginTop:4, display:"inline-block", fontSize:9, padding:"1px 6px",
                            borderRadius:10, background:"rgba(90,58,24,0.15)", color:"#5a3a18"
                          }}>{item.deOccultis.type}</div>
                        </div>
                        <div style={{padding:"8px 10px", background:"rgba(58,40,16,0.08)"}}>
                          <div style={{fontSize:9, letterSpacing:"0.15em", color:"#4a3a6a", marginBottom:4}}>MUNICH HANDBOOK</div>
                          <div style={{fontSize:11, color:"#2a1808", fontStyle:"italic", lineHeight:1.5}}>{item.munich.text}</div>
                          <div style={{fontSize:9, color:"#8a7050", marginTop:4}}>{item.munich.ref}</div>
                          <div style={{
                            marginTop:4, display:"inline-block", fontSize:9, padding:"1px 6px",
                            borderRadius:10, background:"rgba(58,40,90,0.15)", color:"#4a3a6a"
                          }}>{item.munich.type}</div>
                        </div>
                      </div>
                      {/* Expanded significance */}
                      {expanded && (
                        <div style={{padding:"10px 12px", background:"rgba(42,24,8,0.12)", borderTop:"1px solid rgba(90,58,24,0.2)"}}>
                          <div style={{fontSize:10, letterSpacing:"0.1em", color:"#5a3a18", marginBottom:4}}>SIGNIFICANCE</div>
                          <div style={{fontSize:12, color:"#2a1808", lineHeight:1.7, fontStyle:"italic"}}>{item.significance}</div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
            <div style={{...panelStyle, fontSize:10, color:"#6a5a3a", fontStyle:"italic", lineHeight:1.7}}>
              Cross-references derived from entity extraction across 26 distilled chunks of De Occultis and the Munich Handbook necromancy corpus. Entities matched by semantic category (material, spirit, ritual object, temporal system). 212 unique De Occultis entities extracted via nemotron-nano-omni distillation pipeline.
            </div>
          </div>
        )}

        {activeTab === "lore" && (
          <div style={{display:"flex", flexDirection:"column", gap:12}}>
            <div style={{...panelStyle}}>
              <div style={{fontSize:13, fontWeight:"bold", color:"#3a2810", marginBottom:4}}>
                {planet.sym} {planet.name} — {planet.desc.split(".")[0]}
              </div>
              <WoodcutDivider/>
              <div style={{fontSize:12, lineHeight:1.8, color:"#2a1808"}}>{planet.desc}</div>
            </div>

            <div style={{...panelStyle}}>
              <div style={{fontSize:11, letterSpacing:"0.12em", color:"#5a3a18", marginBottom:8}}>ALL SEVEN PLANETARY CIPHERS</div>
              {PLANETS.map(p => (
                <div key={p.name} style={{
                  marginBottom:10, paddingBottom:10,
                  borderBottom:"1px solid rgba(90,58,24,0.2)",
                }}>
                  <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:3}}>
                    <span style={{fontSize:18, color:p.color}}>{p.sym}</span>
                    <span style={{fontWeight:"bold", fontSize:13, color:p.color}}>{p.name}</span>
                    <span style={{fontSize:10, color:"#6a5a3a", marginLeft:"auto"}}>{p.metal} · {p.angel}</span>
                  </div>
                  <div style={{fontSize:11, color:"#3a2810", fontStyle:"italic"}}>{p.method}</div>
                  <div style={{fontSize:10, color:"#8a7050", marginTop:3}}>Porta: "{p.porta_ref}"</div>
                </div>
              ))}
            </div>

            <div style={{...panelStyle}}>
              <div style={{fontSize:11, letterSpacing:"0.12em", color:"#5a3a18", marginBottom:8}}>INVISIBLE INK FORMULAE</div>
              {[
                {mat:"Egg white (albumen)", method:"Write on paper or wood — dries clear. Revealed by heat or chemical treatment.", ref:"Chunk 024"},
                {mat:"Alum + Gall Nuts", method:"Crush together to produce impermeable ink. Revealed by heat or vinegar.", ref:"Chunk 024"},
                {mat:"Iron Gall Ink", method:"Penetrates paper invisibly if diluted. Standard scriptorial ink of the period.", ref:"Chunk 001"},
                {mat:"Lead Lamellae + Wax", method:"Inscribe on thin lead sheet, fold and seal with wax. The physical form of a curse tablet.", ref:"Chunk 013"},
              ].map((f, i) => (
                <div key={i} style={{marginBottom:8, paddingBottom:8, borderBottom:"1px solid rgba(90,58,24,0.15)"}}>
                  <div style={{fontWeight:"bold", fontSize:12, color:"#3a2810"}}>{f.mat}</div>
                  <div style={{fontSize:11, color:"#5a3a18", fontStyle:"italic"}}>{f.method}</div>
                  <div style={{fontSize:9, color:"#8a7050"}}>De Occultis, {f.ref}</div>
                </div>
              ))}
            </div>

            <div style={{...panelStyle}}>
              <div style={{fontSize:11, letterSpacing:"0.12em", color:"#5a3a18", marginBottom:8}}>CARRIER METHODS</div>
              {[
                {name:"Carrier Doves", detail:"Attach message to leg. Porta cites Herodotus, Caesar, Ptolemy. The same bird used in magical rites.", ref:"Chunk 010"},
                {name:"Scytale (Cipher Stick)", detail:"Spartan device — wrap strip of parchment around a rod. Message only readable on a rod of identical diameter.", ref:"Chunk 019"},
                {name:"Wax Tablet Surface", detail:"Write on wood beneath wax surface. Appearance of a blank tablet conceals the message.", ref:"Chunk 013"},
                {name:"Papyrus Roll", detail:"Rolled papyrus container — message hidden inside structural layers of the scroll.", ref:"Chunk 017"},
                {name:"Javelin / Arrow", detail:"Porta cites classical use of messages attached to arrows or bolts fired into besieged cities.", ref:"Chunk 010"},
              ].map((c, i) => (
                <div key={i} style={{marginBottom:8, paddingBottom:8, borderBottom:"1px solid rgba(90,58,24,0.15)"}}>
                  <div style={{fontWeight:"bold", fontSize:12, color:"#3a2810"}}>{c.name}</div>
                  <div style={{fontSize:11, color:"#5a3a18", fontStyle:"italic"}}>{c.detail}</div>
                  <div style={{fontSize:9, color:"#8a7050"}}>De Occultis, {c.ref}</div>
                </div>
              ))}
            </div>

            <div style={{...panelStyle}}>
              <div style={{fontSize:10, color:"#6a5a3a", fontStyle:"italic", lineHeight:1.7}}>
                <em>Giambattista della Porta</em> (1535–1615) was a Neapolitan polymath — natural magician, cryptographer, playwright, and founder of the <em>Accademia dei Segreti</em> (Academy of Secrets), one of the first scientific societies in Europe. <em>De Occultis Literarum Notis</em> (1592) is his systematic treatise on cryptography, the most comprehensive of the Renaissance. His planetary cipher system assigns each planet a distinct encoding method — the same seven planets that govern hours, angels, and spirits in the tradition of the Munich Handbook.
              </div>
            </div>
          </div>
        )}

      </div>

      {/* ── FOOTER ── */}
      <div style={{background:"#2a1808", padding:"10px 20px", textAlign:"center"}}>
        <WoodcutBorder/>
        <div style={{fontSize:9, letterSpacing:"0.2em", color:"#6a5040", marginTop:8}}>
          COMPANION TO THE SPHERE OF HEW DRAPER · MUNICH HANDBOOK RESEARCH PROJECT
        </div>
        <div style={{fontSize:9, color:"#4a3020", marginTop:3}}>
          Based on De Occultis Literarum Notis (Giambattista della Porta, Naples, 1592) · OCR + Translation via nemotron-nano-omni
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
