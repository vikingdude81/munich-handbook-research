/* ═══ LUNAR FUNCTIONS ═══ */
function getMansion(moonLon) {
  const idx = Math.floor(((moonLon % 360 + 360) % 360) / (360/28));
  return { index: idx, mansion: MANSIONS[idx], number: idx + 1 };
}

function getMoonPhase(sunL, moonL) {
  const pa = ((moonL - sunL) % 360 + 360) % 360;
  const illum = (1 - Math.cos(pa * Math.PI / 180)) / 2 * 100;
  const phaseNum = Math.floor(pa / (360/28)) + 1;
  const phase8 = Math.floor(pa / 45);
  const names8 = ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"];
  const icons8 = ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
  const quad = YEATS_QUAD.find(q => q.phases.includes(phaseNum)) || YEATS_QUAD[0];
  return { pa, illum, phaseNum, phase8: names8[phase8], icon8: icons8[phase8], quad };
}

function getGrimoire(pos, moon) {
  const mansion = getMansion(pos.Moon);
  const lines = [];
  lines.push({ t: "Lunar Mansion " + mansion.number + ": " + mansion.mansion.n, d: "Star: " + mansion.mansion.star + " · Nature: " + mansion.mansion.nature + "\nOperation: " + mansion.mansion.op + "\nTalisman: " + mansion.mansion.tal });
  
  const moonEl = gS(pos.Moon).e;
  if (moonEl === "Water") lines.push({ t: "Water Moon", d: "Psychic receptivity heightened. Scrying and divination effective. Spirits communicate through vision." });
  else if (moonEl === "Fire") lines.push({ t: "Fire Moon", d: "Courage and command. Spirits respond to authority. Evocations benefit from assertive language." });
  else if (moonEl === "Air") lines.push({ t: "Air Moon", d: "Intellectual operations — knowledge-seeking, communication with spirits, cipher work." });
  else lines.push({ t: "Earth Moon", d: "Material workings. Talismans, herbal preparations, inscribed objects carry extra potency." });
  
  for (const [p, l] of Object.entries(pos)) {
    const dig = gDig(p, l);
    if (dig.t === "Domicile" || dig.t === "Exalted") {
      const ang = ANG[p];
      lines.push({ t: p + " " + dig.t, d: ang.a + " at full power. Workings aligned with " + p + " carry exceptional force. Use " + p + " planetary hour." });
    }
    if (dig.t === "Fall" && p === "Saturn") {
      lines.push({ t: "Saturn in Fall", d: "Binding circles unreliable. Reinforce with additional divine names and geometry. Cassiel diminished." });
    }
  }
  
  const strongP = Object.entries(pos).find(([n,l]) => gDig(n,l).t === "Domicile") || Object.entries(pos).find(([n,l]) => gDig(n,l).t === "Exalted");
  if (strongP) {
    const [pn] = strongP;
    lines.push({ t: "Picatrix Recommendation", d: "With " + pn + " empowered, create a talisman of " + PL[pn].m + " during the " + pn + " hour, inscribed with the seal of " + ANG[pn].a + ". The lunar mansion (" + mansion.mansion.n + ") " + (mansion.mansion.nature === "Benefic" ? "supports this working." : mansion.mansion.nature === "Destructive" ? "suggests caution — redirect toward protective intent." : "is neutral — the talisman's purpose will determine the outcome.") });
  }
  return lines;
}

/* ═══ BRUNO COMBINATORY DISK ═══ */
function BrunoDisk({ pos }) {

  const mansion = getMansion(pos.Moon);

      {DECANS.map((d, i) => {
        const a = ((i * 10 + 5) - 90) * Math.PI / 180;

          <g key={"d" + i}>

          <g key={"bp" + i}>

          </g>

      {MANSIONS.map((m, i) => {
        const a = ((i * (360/28) + (180/28)) - 90) * Math.PI / 180;

/* ═══ MAGIC SQUARE ═══ */
function MSq({planet}){const ang=ANG[planet];if(!ang)return null;const grids={3:[[2,7,6],[9,5,1],[4,3,8]],4:[[4,14,15,1],[9,7,6,12],[5,11,10,8],[16,2,3,13]],5:[[11,24,7,20,3],[4,12,25,8,16],[17,5,13,21,9],[10,18,1,14,22],[23,6,19,2,15]]};const n=ang.sq,grid=grids[n];if(!grid)return(<div style={{color:"#8a7a5a",fontSize:11}}>Order-{n} square</div>);const cs=Math.min(32,160/n);
  return(<div style={{display:"inline-block"}}><table style={{borderCollapse:"collapse",margin:"0 auto"}}><tbody>{grid.map((row,r)=>(<tr key={r}>{row.map((v,c)=>(<td key={c} style={{width:cs,height:cs,textAlign:"center",border:"1px solid "+PL[planet].c+"20",color:"#3a2810",fontSize:cs>28?12:9,fontFamily:"'IM Fell English',serif"}}>{v}</td>))}</tr>))}</tbody></table><div style={{textAlign:"center",fontSize:9,color:"#8a7a5a",marginTop:3}}>Σ{ang.n} · {n}×{n}</div></div>);
}

                <div style={{ fontSize: 10, color: "#8a7a5a", textTransform: "uppercase", letterSpacing: 1 }}>Moon — Emotion & Soul</div>
                <div style={{ fontSize: 24, color: EC[gS(pos.Moon).e], marginTop: 4 }}>{gS(pos.Moon).s} <span style={{ fontSize: 14 }}>{gS(pos.Moon).n}</span></div>
                <div style={{ fontSize: 11, color: "#5a4a2a", marginTop: 6, lineHeight: 1.6 }}>{ZOD.find(z => z.n === gS(pos.Moon).n).d}</div>
              </div>
            </div>

            <div className="pc" style={{ marginTop: 8 }}>
              <div style={{ fontSize: 10, color: "#8a7a5a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Kircher Planetary-Organ Map</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 8px" }}>
                {Object.entries(ORGANS).map(([p, organ]) => {
                  const dig = gDig(p, pos[p]);
                  const strong = dig.t === "Domicile" || dig.t === "Exalted";
                  return (
                    <div key={p} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, opacity: strong ? 1 : 0.5 }}>
                      <span style={{ color: PL[p].c, fontSize: 13 }}>{PL[p].s}</span>
                      <span style={{ color: "#5a4a2a" }}>{organ}</span>
                      {strong && <span style={{ color: dig.c, fontSize: 8, marginLeft: "auto" }}>★ {dig.t}</span>}
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize: 10, color: "#8a7a5a", marginTop: 4, fontStyle: "italic" }}>Empowered planets activate Kircher's corresponding organs.</div>
            </div>

            {fA(pos).length > 0 && (
              <div className="pc" style={{ marginTop: 8 }}>
                <div style={{ fontSize: 10, color: "#8a7a5a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Aspects</div>
                {fA(pos).map((a, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: i < fA(pos).length - 1 ? "1px solid #c4a86810" : "none", alignItems: "flex-start" }}>
                    <div style={{ display: "flex", gap: 4, alignItems: "center", minWidth: 70 }}>
                      <span style={{ color: PL[a.p1].c, fontSize: 16 }}>{PL[a.p1].s}</span>
                      <span style={{ color: a.asp.c, fontSize: 14 }}>{a.asp.s}</span>
                      <span style={{ color: PL[a.p2].c, fontSize: 16 }}>{PL[a.p2].s}</span>
                    </div>
                    <div style={{ fontSize: 11, color: "#5a4a2a", lineHeight: 1.5 }}>
                      <strong style={{ color: "#3a2810" }}>{a.p1} {a.asp.n} {a.p2}</strong> — {a.asp.n === "Conjunction" ? a.p1 + " and " + a.p2 + " fuse their energies. What one does, the other amplifies." : a.asp.n === "Trine" ? "Effortless flow between " + a.p1 + " and " + a.p2 + ". Gifts that arrive without struggle." : a.asp.n === "Square" ? "Tension between " + a.p1 + " and " + a.p2 + ". Growth through friction. Neither planet yields easily." : a.asp.n === "Sextile" ? "Gentle opportunity between " + a.p1 + " and " + a.p2 + ". Available if you reach for it." : a.p1 + " and " + a.p2 + " face each other across the sky. Awareness through opposition."}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <WDiv />
            <div className="sl">Grimoire Guidance</div>
            {getGrimoire(pos, getMoonPhase(pos.Sun, pos.Moon)).map((g, i) => (
              <div key={i} style={{ padding: "8px 0", borderBottom: "1px solid #c4a86820" }}>
                <div style={{ fontSize: 13, color: "#8b6914", marginBottom: 4 }}>{g.t}</div>
                <div style={{ fontSize: 11, color: "#5a4a2a", lineHeight: 1.7, whiteSpace: "pre-line" }}>{g.d}</div>
              </div>
            ))}

            <WDiv />
            <div className="sl">The 28 Lunar Mansions</div>
            <div style={{ fontSize: 10, color: "#8a7a5a", marginBottom: 6, fontStyle: "italic" }}>From the Picatrix & Agrippa's De Occulta Philosophia</div>
            {MANSIONS.map((m, i) => (
              <div key={i} style={{ display: "flex", gap: 6, padding: "3px 0", borderBottom: "1px solid #c4a86810", opacity: i === getMansion(pos.Moon).index ? 1 : 0.45 }}>
                <span style={{ fontSize: 10, color: i === getMansion(pos.Moon).index ? "#8b6914" : "#8a7a5a", width: 18, fontWeight: i === getMansion(pos.Moon).index ? 700 : 400 }}>{i + 1}</span>
                <span style={{ fontSize: 10, color: "#3a2810", flex: 1 }}>{m.n}</span>
                <span style={{ fontSize: 8, color: m.nature === "Benefic" ? "#5a6b3a" : m.nature === "Destructive" ? "#8b3a3a" : "#8a7a5a" }}>{m.nature}</span>
              </div>
            ))}
          </div>
        )}

        {tab === "bruno" && (
          <div>
            <div className="sl">Bruno's Combinatory Disk</div>
            <div style={{ fontSize: 10, color: "#8a7a5a", marginBottom: 8, fontStyle: "italic" }}>After Giordano Bruno, Opera II (1886) — zodiac decans, planets, and lunar mansions on rotating Lullian wheels</div>
            <BrunoDisk pos={pos} />
            <div className="pc" style={{ marginTop: 8 }}>
              <div style={{ fontSize: 10, color: "#8a7a5a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Current Alignment</div>
              <div style={{ fontSize: 11, color: "#5a4a2a", lineHeight: 1.7 }}>
                <div>Outer ring: 36 decans (3 per zodiac sign, each 10°)</div>
                <div>Middle ring: 7 planets at their current ecliptic positions</div>
                <div>Inner ring: 28 lunar mansions with Moon marker at Mansion {getMansion(pos.Moon).number} ({getMansion(pos.Moon).mansion.n})</div>
              </div>
            </div>
            <div className="ib">
              <strong>Bruno's System:</strong> Giordano Bruno combined the classical art of memory with Ramon Lull's rotating combinatory disks, mapping zodiac decan images, planetary pictures, and lunar phase images onto concentric wheels. By rotating the wheels independently, every possible combination of celestial conditions could be generated — a Renaissance computational device for exploring the space of all possible astrological configurations. Bruno was burned at the stake in 1600 for, among other heresies, this magical cosmology.
            </div>
          </div>
        )}

        {tab === "angels" && (
          <div>
            <div className="sl">The Seven Planetary Angels</div>
            <div style={{ fontSize: 10, color: "#8a7a5a", marginBottom: 8, fontStyle: "italic" }}>Scot, Discoverie of Witchcraft, Book XV Ch. VII (1584)</div>
            {Object.entries(ANG).map(([planet, ang]) => {
              const pd = PL[planet]; const isOpen = selP === planet;
              return (
                <div key={planet} onClick={() => sSelP(isOpen ? null : planet)} className="aRow">
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 20, color: pd.c, width: 26, textAlign: "center" }}>{pd.s}</span>
                    <div style={{ flex: 1 }}><div style={{ fontSize: 14, color: "#3a2810" }}>{ang.a}</div><div style={{ fontSize: 10, color: "#8a7a5a" }}>{ang.rk} · {planet} · {DN[DR.indexOf(planet)]} · {ORGANS[planet]}</div></div>
                    <span style={{ fontSize: 9, color: "#8a7a5a" }}>{isOpen ? "▼" : "▶"}</span>
                  </div>
                  {isOpen && (
                    <div style={{ marginTop: 8, paddingLeft: 34 }}>
                      <div style={{ fontSize: 11, color: pd.c, fontStyle: "italic", marginBottom: 6 }}>&quot;{ang.inv}&quot;</div>
                      <div style={{ fontSize: 11, color: "#5a4a2a", lineHeight: 1.6 }}>
                        <div>Intelligence: {ang.int} · Spirit: {ang.sp}</div>
                      </div>
                      <div style={{ marginTop: 6 }}><div className="sl">Kamea</div><MSq planet={planet} /></div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {tab === "circle" && (
          <div>
            <div className="sl">The Conjuring Circle</div>
            <div style={{fontSize:11,color:"#8a7a5a",marginBottom:8,fontStyle:"italic"}}>From Discoverie of Witchcraft, Book XV — "Conjuring for a Spirit"</div>
            <div style={{display:"flex",justifyContent:"center"}}><ConjCircle/></div>
            <WDiv/>
            <div style={{marginTop:4}}>
              {DIVN.map(d=>(<div key={d.n} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:"1px solid #c4a86815"}}>
                <span style={{fontSize:11,color:"#8b6914",width:28,textAlign:"center"}}>{d.p}</span>
                <span style={{fontSize:12,color:"#3a2810",minWidth:100}}>{d.n}</span>
                <span style={{fontSize:10,color:"#8a7a5a",flex:1}}>{d.d}</span>
              </div>))}
            </div>
            <div className="ib"><strong>Context:</strong> Draper's sphere tells you WHEN to work. The conjuring circle tells you HOW. The operator stands at center (Magister), surrounded by divine names as authority and protection. The pentagram and concentric rings create geometric containment.</div>
          </div>
        )}

        {tab === "hours" && (
          <div>
            <div className="sl">Planetary Hours — Draper's Grid</div>
            <HTable sD={sD} onSD={sSD} sH={sH} onSH={sSH} />
            {selHP && (
              <div className="pc">
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 28, color: PL[selHP].c }}>{PL[selHP].s}</span>
                  <div>
                    <div style={{ fontSize: 14 }}>{selHP} · {ANG[selHP] ? ANG[selHP].a : ""}</div>
                    <div style={{ fontSize: 10, color: "#8a7a5a" }}>{DN[sD]} · Hour {sH} · {PL[selHP].m} · {ORGANS[selHP]}</div>
                    {ANG[selHP] && <div style={{ fontSize: 10, color: PL[selHP].c, marginTop: 3, fontStyle: "italic" }}>Int: {ANG[selHP].int} · Sp: {ANG[selHP].sp}</div>}
                  </div>
                </div>
              </div>
            )}
            {!selHP && <div className="ib"><strong>Tap any cell</strong> — planet, angel, intelligence, spirit, and organ.</div>}
          </div>
        )}

        {tab === "cipher" && (
          <div>
            <div className="sl">Renaissance Cryptography</div>
            <div style={{ fontSize: 10, color: "#8a7a5a", marginBottom: 8, fontStyle: "italic" }}>Della Porta, De Occultis Literarum Notis (1592)</div>
            {CIPH.map((c, i) => (
              <div key={i} style={{ padding: "8px 0", borderBottom: "1px solid #c4a86818" }}>
                <div style={{ fontSize: 13, color: "#8b6914", marginBottom: 2 }}>{c.n}</div>
                <div style={{ fontSize: 11, color: "#5a4a2a", lineHeight: 1.5 }}>{c.d}</div>
                <div style={{ fontSize: 9, color: "#8a7a5a", marginTop: 2, fontStyle: "italic" }}>{c.f}</div>
              </div>
            ))}
            <div className="ib"><strong>The Connection:</strong> The angelic characters in Scot's Ch. VII are a cipher — each sigil traced through the planetary Kamea. Della Porta published De Furtivis in 1563, two years after Draper.</div>
            <div className="ib"><strong>Sources:</strong><div style={{ marginTop: 3 }}>
              <div>Discoverie — gutenberg.org/ebooks/60766</div>
              <div>De Occultis — archive.org/details/de-occultis-literarum-notis-seu-artis</div>
            </div></div>
          </div>
        )}

        <WDiv />
        <div style={{ fontSize: 8, color: "#8a7a5a", textAlign: "center", lineHeight: 1.8, opacity: 0.5 }}>
          Ephemeris: Swiss Ephemeris DE431 · Mansions: Picatrix & Agrippa · Angels: Scot & Agrippa<br />
          "Hew Draper of Brystow made thys spheer the 30 daye of Maye anno 1561"
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
