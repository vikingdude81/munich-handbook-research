const { useState, useEffect } = React;

/* ══════ DATA ══════ */
const CHALDEAN=["Saturn","Jupiter","Mars","Sun","Venus","Mercury","Moon"];
const DR=["Sun","Moon","Mars","Mercury","Jupiter","Venus","Saturn"];
const DN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const ZOD=[
  {n:"Aries",s:"♈",e:"Fire",st:"Mar 21",ru:"Mars",q:"Cardinal",d:"Initiative, courage, raw energy. The ram charges — first sign, spring equinox."},
  {n:"Taurus",s:"♉",e:"Earth",st:"Apr 20",ru:"Venus",q:"Fixed",d:"Stability, sensuality, material wealth. The bull holds ground."},
  {n:"Gemini",s:"♊",e:"Air",st:"May 21",ru:"Mercury",q:"Mutable",d:"Communication, duality, intellect. Draper carved his sphere under this sign."},
  {n:"Cancer",s:"♋",e:"Water",st:"Jun 21",ru:"Moon",q:"Cardinal",d:"Nurture, protection, emotional depth. The crab carries its home."},
  {n:"Leo",s:"♌",e:"Fire",st:"Jul 23",ru:"Sun",q:"Fixed",d:"Authority, creativity, will. The Sun's own domicile."},
  {n:"Virgo",s:"♍",e:"Earth",st:"Aug 23",ru:"Mercury",q:"Mutable",d:"Analysis, precision. The maiden winnows wheat from chaff."},
  {n:"Libra",s:"♎",e:"Air",st:"Sep 23",ru:"Venus",q:"Cardinal",d:"Balance, justice, partnership. Saturn is exalted here."},
  {n:"Scorpio",s:"♏",e:"Water",st:"Oct 23",ru:"Mars",q:"Fixed",d:"Transformation, secrets, power. The scorpion strikes from shadow."},
  {n:"Sagittarius",s:"♐",e:"Fire",st:"Nov 22",ru:"Jupiter",q:"Mutable",d:"Exploration, philosophy, freedom. The archer aims at truth."},
  {n:"Capricorn",s:"♑",e:"Earth",st:"Dec 22",ru:"Saturn",q:"Cardinal",d:"Ambition, structure, mastery. Saturn's own domicile."},
  {n:"Aquarius",s:"♒",e:"Air",st:"Jan 20",ru:"Saturn",q:"Fixed",d:"Innovation, rebellion, humanity. The outsider's sign."},
  {n:"Pisces",s:"♓",e:"Water",st:"Feb 19",ru:"Jupiter",q:"Mutable",d:"Intuition, dissolution, transcendence. The mystic's sign."},
];
const EC={Fire:"#8b3a3a",Earth:"#5a6b3a",Air:"#3a5a6b",Water:"#3a3a6b"};
const PL={
  Sun:{s:"☉",c:"#8b6914",m:"Gold",dom:["Leo"],ex:"Aries",det:["Aquarius"],fa:"Libra",d:"Core identity, vitality, conscious will. Rules Sunday."},
  Moon:{s:"☽",c:"#6a6a78",m:"Silver",dom:["Cancer"],ex:"Taurus",det:["Capricorn"],fa:"Scorpio",d:"Emotion, intuition, the unconscious. Rules Monday."},
  Mercury:{s:"☿",c:"#5a6878",m:"Quicksilver",dom:["Gemini","Virgo"],ex:"Virgo",det:["Sagittarius","Pisces"],fa:"Pisces",d:"Communication, intellect, craft. Rules Wednesday."},
  Venus:{s:"♀",c:"#5a7a5a",m:"Copper",dom:["Taurus","Libra"],ex:"Pisces",det:["Aries","Scorpio"],fa:"Virgo",d:"Love, beauty, harmony. Rules Friday."},
  Mars:{s:"♂",c:"#8b4a4a",m:"Iron",dom:["Aries","Scorpio"],ex:"Capricorn",det:["Taurus","Libra"],fa:"Cancer",d:"Action, conflict, force. Rules Tuesday."},
  Jupiter:{s:"♃",c:"#5a4a7a",m:"Tin",dom:["Sagittarius","Pisces"],ex:"Cancer",det:["Gemini","Virgo"],fa:"Capricorn",d:"Expansion, wisdom, fortune. Rules Thursday."},
  Saturn:{s:"♄",c:"#5a4a3a",m:"Lead",dom:["Capricorn","Aquarius"],ex:"Libra",det:["Cancer","Leo"],fa:"Aries",d:"Restriction, time, death. Rules Saturday."},
};
const ANG={
  Sun:{a:"Michael",rk:"Archangel",int:"Nakhiel",sp:"Sorath",n:111,sq:6,inv:"By the light of the Sun and the authority of Michael, prince of angels"},
  Moon:{a:"Gabriel",rk:"Archangel",int:"Malkah be-Tarshisim",sp:"Chasmodai",n:369,sq:9,inv:"By the tides of the Moon and the vision of Gabriel"},
  Mars:{a:"Samael",rk:"Angel of Severity",int:"Graphiel",sp:"Bartzabel",n:65,sq:5,inv:"By the fires of Mars and the severity of Samael"},
  Mercury:{a:"Raphael",rk:"Archangel",int:"Tiriel",sp:"Taphthartharath",n:260,sq:8,inv:"By the wind of Mercury and the healing of Raphael"},
  Jupiter:{a:"Sachiel",rk:"Archangel",int:"Iophiel",sp:"Hismael",n:34,sq:4,inv:"By the thunder of Jupiter and the benevolence of Sachiel"},
  Venus:{a:"Anael",rk:"Angel of Love",int:"Hagiel",sp:"Kedemel",n:175,sq:7,inv:"By the grace of Venus and the beauty of Anael"},
  Saturn:{a:"Cassiel",rk:"Angel of Solitude",int:"Agiel",sp:"Zazel",n:15,sq:3,inv:"By the weight of Saturn and the patience of Cassiel"},
};
const DIVN=[
  {n:"Adonai",p:"N",d:"Lord — divine name of sovereignty"},
  {n:"Tetragrammaton",p:"NE",d:"YHVH — the ineffable four-letter name"},
  {n:"Agla",p:"E",d:"Thou art mighty forever, O Lord"},
  {n:"Messias",p:"SE",d:"The anointed one"},
  {n:"Emanuel",p:"S",d:"God is with us"},
  {n:"Panthon",p:"SW",d:"All-ruler — from Greek pantokrator"},
  {n:"Iesus Nazarenus",p:"W",d:"Invoked as divine authority"},
  {n:"Magister",p:"C",d:"The operator's station"},
];
const CIPH=[
  {n:"Substitution Cipher",d:"Replace each letter using a keyed alphabet disk with concentric rotating wheels.",f:"De Occultis, Lib. I"},
  {n:"Digraphic Cipher",d:"First known cipher on letter PAIRS — dramatically increasing keyspace.",f:"De Occultis, Lib. II"},
  {n:"Music Cipher",d:"Messages encoded as musical notation. One of the earliest steganographic methods.",f:"De Occultis, Lib. III"},
  {n:"Invisible Ink",d:"Write on eggshell with alum ink — penetrates the porous shell. Boil to erase outer traces.",f:"De Occultis, Lib. IV"},
  {n:"Volvelle Disk",d:"Rotating concentric alphabet wheels — the original cipher machine.",f:"De Occultis, Appendix"},
];

const DP={Sun:78.09,Moon:281.35,Mercury:65.07,Venus:122.27,Mars:320.77,Jupiter:47.48,Saturn:83.64};
const TP={Sun:43.1,Moon:2.7+240,Mercury:0.7+30,Venus:11.3+60,Mars:18.3,Jupiter:19.3+90,Saturn:9.4};
const MM={Sun:0.9856,Moon:13.176,Mercury:1.383,Venus:1.2,Mars:0.524,Jupiter:0.0831,Saturn:0.0335};
const TJD=2461131.5;
function d2jd(y,m,d){if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;}
function aP(r,rj,tj){const dt=tj-rj,p={};for(const k of Object.keys(r))p[k]=((r[k]+MM[k]*dt)%360+360)%360;return p;}

const ASP=[{n:"Conjunction",a:0,o:8,s:"☌",c:"#8b6914"},{n:"Sextile",a:60,o:6,s:"⚹",c:"#5a7a5a"},{n:"Square",a:90,o:7,s:"□",c:"#8b4a4a"},{n:"Trine",a:120,o:8,s:"△",c:"#5a4a7a"},{n:"Opposition",a:180,o:8,s:"☍",c:"#5a4a3a"}];
function fA(pos){const n=Object.keys(pos),r=[];for(let i=0;i<n.length;i++)for(let j=i+1;j<n.length;j++){let d=Math.abs(pos[n[i]]-pos[n[j]]);if(d>180)d=360-d;for(const a of ASP)if(Math.abs(d-a.a)<=a.o)r.push({p1:n[i],p2:n[j],asp:a,ex:d});}return r;}
function gS(l){return ZOD[Math.floor(((l%360)+360)%360/30)];}
function gD(l){return((l%360)+360)%360%30;}
function gDig(p,l){const s=gS(l).n,d=PL[p];if(d.dom.includes(s))return{t:"Domicile",c:"#8b6914"};if(d.ex===s)return{t:"Exalted",c:"#5a7a5a"};if(d.det.includes(s))return{t:"Detriment",c:"#8b4a4a"};if(d.fa===s)return{t:"Fall",c:"#5a4a3a"};return{t:"Peregrine",c:"#6a5a4a"};}
function gPH(di,h){return CHALDEAN[(CHALDEAN.indexOf(DR[di])+h)%7];}

/* ══════ WOODCUT DECORATIONS ══════ */
function WoodcutBorder(){
  return(
    <svg viewBox="0 0 500 24" style={{width:"100%",height:24,display:"block",opacity:0.4}}>
      {Array.from({length:50},(_,i)=>{
        const x=i*10+5;
        return <g key={i}>
          <line x1={x-3} y1={8} x2={x} y2={4} stroke="#3a2810" strokeWidth="1.2"/>
          <line x1={x} y1={4} x2={x+3} y2={8} stroke="#3a2810" strokeWidth="1.2"/>
          <line x1={x-2} y1={14} x2={x+2} y2={14} stroke="#3a2810" strokeWidth="0.8"/>
          <circle cx={x} cy={19} r={1} fill="#3a2810" opacity="0.5"/>
        </g>;
      })}
    </svg>
  );
}

function WoodcutDivider(){
  return(
    <svg viewBox="0 0 400 20" style={{width:"100%",maxWidth:300,height:16,display:"block",margin:"8px auto",opacity:0.35}}>
      <line x1={20} y1={10} x2={180} y2={10} stroke="#3a2810" strokeWidth="0.8"/>
      <line x1={220} y1={10} x2={380} y2={10} stroke="#3a2810" strokeWidth="0.8"/>
      <circle cx={200} cy={10} r={5} fill="none" stroke="#3a2810" strokeWidth="1"/>
      <circle cx={200} cy={10} r={2} fill="#3a2810"/>
      <line x1={190} y1={4} x2={200} y2={0} stroke="#3a2810" strokeWidth="0.6"/>
      <line x1={200} y1={0} x2={210} y2={4} stroke="#3a2810" strokeWidth="0.6"/>
      <line x1={190} y1={16} x2={200} y2={20} stroke="#3a2810" strokeWidth="0.6"/>
      <line x1={200} y1={20} x2={210} y2={16} stroke="#3a2810" strokeWidth="0.6"/>
    </svg>
  );
}

function CornerOrnament({flip}){
  return(
    <svg viewBox="0 0 40 40" style={{width:32,height:32,opacity:0.3,transform:flip?"scaleX(-1)":"none"}}>
      <path d="M2 38 Q2 2 38 2" fill="none" stroke="#3a2810" strokeWidth="1.5"/>
      <path d="M6 34 Q6 6 34 6" fill="none" stroke="#3a2810" strokeWidth="0.8"/>
      <circle cx={8} cy={8} r={2} fill="#3a2810"/>
      <path d="M2 28 C8 24 12 18 14 2" fill="none" stroke="#3a2810" strokeWidth="0.5"/>
    </svg>
  );
}

/* ══════ WHEEL ══════ */
function Wheel({pos,label,showV,showA,hlP,selZ,selP,onCZ,onCP}){
  const sz=400,cx=sz/2,cy=sz/2,oR=180,iR=138,sR=158,pR=112,cR=52;
  const vP=Array.from({length:5},(_,i)=>(pos.Venus+i*215.6)%360);
  const asp=fA(pos);
  const ticks=[];
  for(let i=0;i<360;i+=10){const a=(i-90)*Math.PI/180;const r2=oR+(i%30===0?8:4);ticks.push(<line key={"t"+i} x1={cx+(oR+1)*Math.cos(a)} y1={cy+(oR+1)*Math.sin(a)} x2={cx+r2*Math.cos(a)} y2={cy+r2*Math.sin(a)} stroke="#5a4a2a" strokeWidth={i%30===0?1:0.4}/>);}

  return(
    <svg viewBox={"0 0 "+sz+" "+sz} style={{width:"100%",maxWidth:400}}>
      <defs>
        <radialGradient id="cg"><stop offset="0%" stopColor="#8b691420"/><stop offset="100%" stopColor="transparent"/></radialGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glB"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="aged"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/></filter>
      </defs>
      {ticks}
      <circle cx={cx} cy={cy} r={oR} fill="none" stroke="#5a4a2a" strokeWidth="2"/>
      <circle cx={cx} cy={cy} r={oR-1} fill="none" stroke="#5a4a2a" strokeWidth="0.3"/>
      <circle cx={cx} cy={cy} r={iR} fill="none" stroke="#5a4a2a" strokeWidth="1"/>
      <circle cx={cx} cy={cy} r={cR} fill="url(#cg)" stroke="#5a4a2a" strokeWidth="0.8"/>

      {ZOD.map((z,i)=>{
        const a1=(i*30-90)*Math.PI/180,a2=((i+1)*30-90)*Math.PI/180,am=((i*30+15)-90)*Math.PI/180;
        const isSel=selZ===i;
        const path="M "+(cx+iR*Math.cos(a1))+" "+(cy+iR*Math.sin(a1))+" L "+(cx+oR*Math.cos(a1))+" "+(cy+oR*Math.sin(a1))+" A "+oR+" "+oR+" 0 0 1 "+(cx+oR*Math.cos(a2))+" "+(cy+oR*Math.sin(a2))+" L "+(cx+iR*Math.cos(a2))+" "+(cy+iR*Math.sin(a2))+" A "+iR+" "+iR+" 0 0 0 "+(cx+iR*Math.cos(a1))+" "+(cy+iR*Math.sin(a1));
        return(<g key={z.n} onClick={()=>onCZ(i)} style={{cursor:"pointer"}}>
          <path d={path} fill={isSel?EC[z.e]+"25":"transparent"}/>
          <line x1={cx+iR*Math.cos(a1)} y1={cy+iR*Math.sin(a1)} x2={cx+oR*Math.cos(a1)} y2={cy+oR*Math.sin(a1)} stroke="#5a4a2a" strokeWidth="0.5"/>
          <text x={cx+sR*Math.cos(am)} y={cy+sR*Math.sin(am)} textAnchor="middle" dominantBaseline="central" fill={isSel?"#3a2810":EC[z.e]} fontSize={isSel?20:16} opacity={isSel?1:0.6} style={{fontFamily:"serif"}}>{z.s}</text>
        </g>);
      })}

      {showV&&vP.map((l,i)=>{const n=vP[(i+2)%5],a1=(l-90)*Math.PI/180,a2=(n-90)*Math.PI/180,r=cR+18;
        return(<line key={"v"+i} x1={cx+r*Math.cos(a1)} y1={cy+r*Math.sin(a1)} x2={cx+r*Math.cos(a2)} y2={cy+r*Math.sin(a2)} stroke="#5a7a5a" strokeWidth="0.7" opacity="0.4" strokeDasharray="4,3"/>);})}

      {showA&&asp.map((a,i)=>{const a1=(pos[a.p1]-90)*Math.PI/180,a2=(pos[a.p2]-90)*Math.PI/180;const hl=hlP===a.p1||hlP===a.p2||selP===a.p1||selP===a.p2;
        return(<line key={"a"+i} x1={cx+pR*Math.cos(a1)} y1={cy+pR*Math.sin(a1)} x2={cx+pR*Math.cos(a2)} y2={cy+pR*Math.sin(a2)} stroke={a.asp.c} strokeWidth={hl?1.5:0.6} opacity={hl?0.5:0.2} strokeDasharray={a.asp.a===90?"2,2":"none"}/>);})}

      {Object.entries(pos).map(([name,lon])=>{const angle=(lon-90)*Math.PI/180,px=cx+pR*Math.cos(angle),py=cy+pR*Math.sin(angle);const pd=PL[name];const hl=hlP===name||selP===name;
        return(<g key={name} filter={hl?"url(#glB)":"url(#gl)"} onClick={()=>onCP(name)} style={{cursor:"pointer"}}>
          <circle cx={px} cy={py} r={hl?14:11} fill="#f4e8c8" stroke={pd.c} strokeWidth={hl?2:1}/>
          <text x={px} y={py+1} textAnchor="middle" dominantBaseline="central" fill={pd.c} fontSize={hl?15:12} style={{fontFamily:"serif"}}>{pd.s}</text>
        </g>);})}

      <text x={cx} y={cy-6} textAnchor="middle" fill="#5a4a2a" fontSize="6" style={{fontFamily:"'IM Fell English',serif",letterSpacing:1.5,textTransform:"uppercase"}}>{label.length>28?label.slice(0,28):label}</text>
      <text x={cx} y={cy+7} textAnchor="middle" fill="#8b6914" fontSize="8" style={{fontFamily:"'IM Fell English',serif"}}>Tap signs & planets</text>
    </svg>
  );
}

/* ══════ CONJURING CIRCLE ══════ */
function Circle(){
  const sz=340,cx=sz/2,cy=sz/2;
  const rings=[148,128,105,78,48];
  const dirs=[{l:"North",a:-90},{l:"East",a:0},{l:"South",a:90},{l:"West",a:180}];
  const names=DIVN.filter(d=>d.p!=="C");
  return(
    <svg viewBox={"0 0 "+sz+" "+sz} style={{width:"100%",maxWidth:320}}>
      {rings.map((r,i)=>(<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={i===0?"#5a4a2a":"#8a7a5a"} strokeWidth={i===0?2:0.6}/>))}
      <line x1={cx} y1={cy-148} x2={cx} y2={cy+148} stroke="#8a7a5a" strokeWidth="0.4"/>
      <line x1={cx-148} y1={cy} x2={cx+148} y2={cy} stroke="#8a7a5a" strokeWidth="0.4"/>
      {dirs.map(c=>{const a=c.a*Math.PI/180;return(<text key={c.l} x={cx+156*Math.cos(a)} y={cy+156*Math.sin(a)} textAnchor="middle" dominantBaseline="central" fill="#5a4a2a" fontSize="8" style={{fontFamily:"'IM Fell English',serif",letterSpacing:2,textTransform:"uppercase"}}>{c.l}</text>);})}
      {names.map((d,i)=>{const a=((i*51.4)-90)*Math.PI/180;const x=cx+118*Math.cos(a),y=cy+118*Math.sin(a);return(<text key={d.n} x={x} y={y} textAnchor="middle" dominantBaseline="central" fill="#8b6914" fontSize="7" transform={"rotate("+(i*51.4)+","+x+","+y+")"} style={{fontFamily:"'IM Fell English',serif",fontStyle:"italic"}}>{d.n}</text>);})}
      {[0,1,2,3,4].map(i=>{const a1=((i*72)-90)*Math.PI/180,a2=(((i+2)*72)-90)*Math.PI/180;return(<line key={"p"+i} x1={cx+43*Math.cos(a1)} y1={cy+43*Math.sin(a1)} x2={cx+43*Math.cos(a2)} y2={cy+43*Math.sin(a2)} stroke="#5a4a2a" strokeWidth="0.7"/>);})}
      <text x={cx} y={cy-3} textAnchor="middle" fill="#3a2810" fontSize="9" style={{fontFamily:"'IM Fell English',serif",fontWeight:600}}>Magister</text>
      <text x={cx} y={cy+9} textAnchor="middle" fill="#8a7a5a" fontSize="6" style={{fontFamily:"'IM Fell English',serif"}}>Operator</text>
    </svg>
  );
}

/* ══════ MAGIC SQUARE ══════ */
function MSq({planet}){
  const ang=ANG[planet];if(!ang)return null;
  const grids={3:[[2,7,6],[9,5,1],[4,3,8]],4:[[4,14,15,1],[9,7,6,12],[5,11,10,8],[16,2,3,13]],5:[[11,24,7,20,3],[4,12,25,8,16],[17,5,13,21,9],[10,18,1,14,22],[23,6,19,2,15]]};
  const n=ang.sq,grid=grids[n];if(!grid)return(<div style={{color:"#8a7a5a",fontSize:12}}>Square of order {n}</div>);
  const cs=Math.min(34,170/n);
  return(<div style={{display:"inline-block"}}><table style={{borderCollapse:"collapse",margin:"0 auto"}}><tbody>{grid.map((row,r)=>(<tr key={r}>{row.map((val,c)=>(<td key={c} style={{width:cs,height:cs,textAlign:"center",border:"1px solid #c4a86820",color:"#3a2810",fontSize:cs>30?13:10,fontFamily:"'IM Fell English',serif"}}>{val}</td>))}</tr>))}</tbody></table><div style={{textAlign:"center",fontSize:10,color:"#8a7a5a",marginTop:4}}>Constant: {ang.n} · Order: {n}×{n}</div></div>);
}

/* ══════ CARDS ══════ */
function ZCard({index,pos}){const z=ZOD[index];const here=Object.entries(pos).filter(([_,l])=>gS(l).n===z.n);
  return(<div className="pcard" style={{borderColor:EC[z.e]+"60"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:36,color:EC[z.e]}}>{z.s}</span><div><div className="cardTitle">{z.n}</div><div style={{fontSize:11,color:"#8a7a5a"}}>{z.e} · {z.q} · {z.st} · Ruler: {z.ru}</div></div></div>
    <div style={{fontSize:12,color:"#5a4a2a",marginTop:8,lineHeight:1.7}}>{z.d}</div>
    {here.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #c4a86830"}}><div className="sectionLabel">Planets in {z.n}</div>{here.map(([n,l])=>(<div key={n} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,marginBottom:2}}><span style={{color:PL[n].c,fontSize:16}}>{PL[n].s}</span><span style={{color:"#3a2810"}}>{n} at {gD(l).toFixed(1)}°</span><span style={{color:gDig(n,l).c,fontSize:10,marginLeft:"auto"}}>{gDig(n,l).t}</span></div>))}</div>}
  </div>);
}

function PCard({name,lon}){const pd=PL[name],sign=gS(lon),deg=gD(lon),dig=gDig(name,lon),ang=ANG[name];
  return(<div className="pcard" style={{borderColor:pd.c+"60"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:36,color:pd.c}}>{pd.s}</span><div style={{flex:1}}><div className="cardTitle">{name}</div><div style={{fontSize:12,color:EC[sign.e]}}>{sign.s} {deg.toFixed(1)}° {sign.n}</div><div style={{fontSize:11,color:dig.c}}>{dig.t}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#8a7a5a"}}>{pd.m}</div><div style={{fontSize:12,color:"#5a4a2a"}}>{ang?ang.a:""}</div></div></div>
    <div style={{fontSize:12,color:"#5a4a2a",marginTop:8,lineHeight:1.7}}>{pd.d}</div>
    <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #c4a86830",fontSize:11,color:"#8a7a5a"}}>Domicile: {pd.dom.join(", ")} · Exalted: {pd.ex} · Detriment: {pd.det.join(", ")} · Fall: {pd.fa}</div>
  </div>);
}

/* ══════ HOURS ══════ */
function HTable({selDay,onSD,selHour,onSH}){
  const rows=[];

      cells.push(<td key={di} onClick={()=>{onSD(di);onSH(h);}} style={{padding:"1px 2px",borderBottom:"1px solid #c4a86810",textAlign:"center",cursor:"pointer",fontSize:13,background:sel?"#c4a86825":"transparent",color:pd.c,opacity:(h>=6&&h<18)?1:0.3}} title={p+" — "+(ANG[p]?ANG[p].a:"")}>{pd.s}</td>);}

function getMoonPhase(sunLon, moonLon) {
  const phaseAngle = ((moonLon - sunLon) % 360 + 360) % 360;
  const illumination = (1 - Math.cos(phaseAngle * Math.PI / 180)) / 2 * 100;
  const phase = MOON_PHASES.find(p => phaseAngle >= p.range[0] && phaseAngle < p.range[1]) || MOON_PHASES[0];
  return { phase, phaseAngle, illumination };
}

function MoonPhaseVisual({ phaseAngle, illumination }) {
  const r = 40, cx = 50, cy = 50;
  const cosAngle = Math.cos(phaseAngle * Math.PI / 180);
  return (
    <svg viewBox="0 0 100 100" style={{ width: 80, height: 80 }}>
      <defs>
        <radialGradient id="moonGlow">
          <stop offset="0%" stopColor="#f4e8c8" stopOpacity="0.3" />
          <stop offset="100%" stopColor="transparent" />
        </radialGradient>
      </defs>
      <circle cx={cx} cy={cy} r={r + 8} fill="url(#moonGlow)" />
      <circle cx={cx} cy={cy} r={r} fill="#3a2810" stroke="#5a4a2a" strokeWidth="1" />
      <clipPath id="moonClip">
        <circle cx={cx} cy={cy} r={r} />
      </clipPath>
      <g clipPath="url(#moonClip)">
        {phaseAngle <= 180 ? (
          <ellipse cx={cx} cy={cy} rx={r * Math.abs(cosAngle)} ry={r} fill="#f4e8c8" />
        ) : (
          <>
            <circle cx={cx} cy={cy} r={r} fill="#f4e8c8" />
            <ellipse cx={cx} cy={cy} rx={r * Math.abs(cosAngle)} ry={r} fill="#3a2810" />
          </>
        )}
        {phaseAngle <= 90 && (
          <rect x={cx} y={cy - r} width={r} height={r * 2} fill="#f4e8c8" />
        )}
        {phaseAngle > 90 && phaseAngle <= 180 && (
          <rect x={cx - r} y={cy - r} width={r} height={r * 2} fill="#3a2810" />
        )}
        {phaseAngle > 180 && phaseAngle <= 270 && (
          <rect x={cx} y={cy - r} width={r} height={r * 2} fill="#3a2810" />
        )}
        {phaseAngle > 270 && (
          <rect x={cx - r} y={cy - r} width={r} height={r * 2} fill="#f4e8c8" />
        )}
      </g>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#5a4a2a" strokeWidth="0.8" />
    </svg>
  );
}

function getElementBalance(pos) {
  const counts = { Fire: 0, Earth: 0, Air: 0, Water: 0 };
  for (const [name, lon] of Object.entries(pos)) {
    counts[gS(lon).e]++;
  }
  return counts;
}

function getSummoningGuidance(pos, moonData) {
  const moonSign = gS(pos.Moon);
  const sunSign = gS(pos.Sun);
  const marsDig = gDig("Mars", pos.Mars);
  const saturnDig = gDig("Saturn", pos.Saturn);
  const jupiterDig = gDig("Jupiter", pos.Jupiter);
  const aspects = fA(pos);
  const lines = [];

  lines.push({ title: "Lunar Cycle", text: moonData.phase.grimoire });

  const waterMoon = moonSign.e === "Water";
  const fireMoon = moonSign.e === "Fire";
  if (waterMoon) {
    lines.push({ title: "Moon in " + moonSign.n, text: "A water moon heightens psychic receptivity and emotional sensitivity. Spirits communicate more through feeling and vision than through words. Scrying and divination are especially effective. However, emotional overwhelm is a risk — maintain firm intention." });
  } else if (fireMoon) {
    lines.push({ title: "Moon in " + moonSign.n, text: "A fire moon lends courage and command to workings. Spirits respond to authority and will. Evocations benefit from assertive language. The danger is arrogance — commanding beyond your capacity invites backlash." });
  } else if (moonSign.e === "Air") {
    lines.push({ title: "Moon in " + moonSign.n, text: "An air moon favors intellectual operations — communication with spirits, obtaining knowledge, cipher work. Mercury and Raphael operations are enhanced. The risk is disconnection from the emotional grounding that protects." });
  } else {
    lines.push({ title: "Moon in " + moonSign.n, text: "An earth moon grounds workings in the material. Physical talismans, herbal preparations, and inscribed objects carry extra potency. Operations for wealth, health, and material protection are favored." });
  }

  if (marsDig.t === "Domicile" || marsDig.t === "Exalted") {
    lines.push({ title: "Mars " + marsDig.t, text: "Mars is empowered — Samael is at full strength. Workings of protection, binding, and confrontation carry unusual force. Military and martial spirits respond readily. Use with caution: an empowered Mars cuts both ways." });
  }
  if (marsDig.t === "Detriment" || marsDig.t === "Fall") {
    lines.push({ title: "Mars " + marsDig.t, text: "Mars is weakened — aggressive workings lack force. Samael is diminished. This actually favors peaceful summonings and gentle invocations, as the martial resistance in the astral field is lowered." });
  }

  if (jupiterDig.t === "Domicile" || jupiterDig.t === "Exalted") {
    lines.push({ title: "Jupiter " + jupiterDig.t, text: "Jupiter is empowered — Sachiel bestows abundance and protection. Angelic workings are especially favored. The great benefic shields the practitioner. A rare and fortunate condition." });
  }

  if (saturnDig.t === "Domicile" || saturnDig.t === "Exalted") {
    lines.push({ title: "Saturn " + saturnDig.t, text: "Saturn is empowered — Cassiel operates at full severity. Necromantic workings, ancestral communication, and operations involving time, death, and binding gain power. The weight of Saturn demands respect and preparation." });
  }
  if (saturnDig.t === "Fall") {
    lines.push({ title: "Saturn in Fall", text: "Saturn is debilitated — structures and constraints are unreliable. Binding circles may not hold as expected. Compensate with additional divine names and reinforced geometry. Cassiel's patience is tested." });
  }

  for (const a of aspects) {
    if (a.asp.n === "Square" && (a.p1 === "Mars" || a.p2 === "Mars" || a.p1 === "Saturn" || a.p2 === "Saturn")) {
      lines.push({ title: a.p1 + " □ " + a.p2, text: "A square between malefics or a malefic and benefic creates astral tension. Workings may produce unexpected results. The friction can be harnessed for transformation, but uncontrolled it destabilizes." });
    }
    if (a.asp.n === "Conjunction" && a.p1 === "Sun" && a.p2 === "Saturn") {
      lines.push({ title: "Sun ☌ Saturn", text: "The Sun is under Saturn's weight — authority is burdened. As on Draper's date in 1561. The practitioner's vitality is constrained. Proceed with humility; do not overreach." });
    }
  }

  const dignities = Object.entries(pos).map(([n, l]) => ({ name: n, dig: gDig(n, l) }));
  const strongest = dignities.find(d => d.dig.t === "Domicile") || dignities.find(d => d.dig.t === "Exalted");
  if (strongest) {
    const ang = ANG[strongest.name];
    lines.push({ title: "Recommended Operation", text: "With " + strongest.name + " in " + strongest.dig.t + ", workings aligned with " + (ang ? ang.a : strongest.name) + " carry the greatest natural force. Use the " + strongest.name + " planetary hour for maximum alignment." });
  }

  return lines;
}

          background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
          pointer-events: none;
          z-index: 0;
        }
        .inner { max-width: 480px; margin: 0 auto; padding: 24px 16px; position: relative; z-index: 1; }
        .pageEdge {
          position: fixed; top: 0; bottom: 0; width: 20px;
          background: linear-gradient(90deg, #b89848 0%, #c4a868 30%, transparent 100%);
          opacity: 0.15; z-index: 0;
        }
        .modeBtn {
          flex: 1; padding: 6px 0; background: none; border: none;
          font-family: 'IM Fell English', serif; font-size: 11px; cursor: pointer;
          letter-spacing: 1px; transition: all 0.2s;
        }
        .modeBtn.active { color: var(--ink); border-bottom: 2px solid var(--gold); }
        .modeBtn.inactive { color: var(--ink-faint); border-bottom: 2px solid transparent; }
        .tabBtn {
          flex: 1; padding: 6px 2px; background: none; border: none;
          font-family: 'IM Fell English', serif; font-size: 10px; cursor: pointer;
          white-space: nowrap; transition: all 0.2s;
        }
        .tabBtn.active { color: var(--ink); border-bottom: 2px solid var(--gold); }
        .tabBtn.inactive { color: var(--ink-faint); border-bottom: 2px solid transparent; }
        .pcard {
          background: linear-gradient(135deg, #f4e8c8 0%, #ecdcb8 100%);
          border: 1px solid; padding: 12px 14px; margin-top: 8px;
          box-shadow: 2px 2px 8px #c4a86830;
        }
        .cardTitle { font-size: 18px; color: var(--ink); }
        .sectionLabel { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .infoBox {
          margin-top: 12px; padding: 12px 14px;
          background: linear-gradient(135deg, #ecdcb8 0%, #e4d0a8 100%);
          border: 1px solid #c4a86840;
          font-size: 12px; color: var(--ink-light); line-height: 1.7;
          box-shadow: inset 0 1px 3px #c4a86820;
        }
        .infoBox strong { color: var(--gold); }
        .dateInput {
          background: #ecdcb8; border: 1px solid #c4a86860; color: var(--ink);
          padding: 6px 10px; font-family: 'IM Fell English', serif; font-size: 13px; flex: 1;
        }
        .castBtn {
          background: #c4a86830; border: 1px solid #c4a86860; color: var(--gold);
          padding: 6px 16px; font-family: 'IM Fell English', serif; font-size: 13px;
          cursor: pointer; letter-spacing: 1px;
        }
        .castBtn:hover { background: #c4a86850; }
        .statusBar {
          background: linear-gradient(135deg, #ecdcb8 0%, #e4d0a8 100%);
          border: 1px solid #c4a86830; padding: 8px 12px;
          margin: 8px 0 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .legendItem {
          display: flex; align-items: center; gap: 5px; font-size: 11px; cursor: pointer;
        }
        .legendItem:hover { opacity: 0.7; }
        .angelRow {
          cursor: pointer; border-bottom: 1px solid #c4a86820; padding: 10px 0;
          transition: background 0.2s;
        }
        .angelRow:hover { background: #c4a86810; }
        .checkLabel { font-size: 11px; color: var(--ink-faint); cursor: pointer; display: flex; align-items: center; gap: 4px; }
      `}</style>

      <div className="pageEdge" style={{left:0}}/>
      <div className="pageEdge" style={{right:0,transform:"scaleX(-1)"}}/>

      <div className="inner">
        <div style={{display:"flex",justifyContent:"space-between"}}><CornerOrnament/><CornerOrnament flip/></div>
        <div style={{textAlign:"center",margin:"-12px 0 8px"}}>
          <div style={{fontSize:8,color:"var(--ink-faint)",letterSpacing:8,textTransform:"uppercase"}}>The Occult Library</div>
          <h1 style={{margin:"6px 0 2px",fontSize:22,fontWeight:400,color:"var(--ink)",letterSpacing:1,fontFamily:"'IM Fell DW Pica',serif"}}>
            Draper's Sphere
          </h1>
          <div style={{fontSize:14,color:"var(--gold)",fontStyle:"italic",fontFamily:"'IM Fell English',serif"}}>& the Grimoire Tradition</div>
          <div style={{fontSize:10,color:"var(--ink-faint)",marginTop:4}}>Hew Draper (1561) · Reginald Scot (1584) · Della Porta (1592)</div>
        </div>
        <WoodcutBorder/>

        <div style={{display:"flex",gap:0,marginBottom:6}}>
          {[["draper","Draper 1561"],["today","Today"],["custom","Custom"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setMode(k);sSelZ(null);sSelP(null);}} className={"modeBtn "+(mode===k?"active":"inactive")}>{l}</button>
          ))}
        </div>
        {mode==="custom"&&<div style={{padding:"8px 0 4px"}}><DPick onDC={(p,l)=>{sCP(p);sCL(l);sSelZ(null);sSelP(null);}}/></div>}

        <div className="statusBar">
          <div><div style={{fontSize:9,color:"var(--ink-faint)",textTransform:"uppercase",letterSpacing:2}}>Viewing</div><div style={{fontSize:14,color:"var(--gold)"}}>{label}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"var(--ink-faint)"}}>Sun in</div><div style={{fontSize:15,color:EC[gS(pos.Sun).e]}}>{gS(pos.Sun).s} {gD(pos.Sun).toFixed(0)}° {gS(pos.Sun).n}</div></div>
        </div>

        <div style={{display:"flex",gap:0,marginBottom:10,borderBottom:"1px solid #c4a86830",overflowX:"auto"}}>
          {tabs.map(([k,l])=>(<button key={k} onClick={()=>{setTab(k);sSelZ(null);sSelP(null);}} className={"tabBtn "+(tab===k?"active":"inactive")}>{l}</button>))}
        </div>

        {tab==="sphere"&&<div>
          <Wheel pos={pos} label={label} showV={sV} showA={sA} hlP={hlP} selZ={selZ} selP={selP} onCZ={clickZ} onCP={clickP}/>
          <div style={{display:"flex",gap:16,justifyContent:"center",margin:"6px 0"}}>
            <label className="checkLabel"><input type="checkbox" checked={sV} onChange={()=>sSV(!sV)} style={{accentColor:"#5a7a5a"}}/> Venus</label>
            <label className="checkLabel"><input type="checkbox" checked={sA} onChange={()=>sSA(!sA)} style={{accentColor:"#8b6914"}}/> Aspects</label>
          </div>
          {selZ!==null&&<ZCard index={selZ} pos={pos}/>}
          {selP&&<PCard name={selP} lon={pos[selP]}/>}
          {selZ===null&&!selP&&<div className="infoBox" style={{textAlign:"center"}}>Tap any zodiac sign or planet glyph for details</div>}
          <WoodcutDivider/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 12px",marginTop:4}}>
            {Object.entries(PL).map(([n,pd])=>(<div key={n} onMouseEnter={()=>sHLP(n)} onMouseLeave={()=>sHLP(null)} onClick={()=>clickP(n)} className="legendItem"><span style={{fontSize:16,color:pd.c,width:20,textAlign:"center"}}>{pd.s}</span><span style={{color:"var(--ink-faint)"}}>{n}</span><span style={{color:"#c4a86880",marginLeft:"auto",fontSize:9}}>{ANG[n]?ANG[n].a:""}</span></div>))}
          </div>
        </div>}

        {tab==="reading"&&<ReadingTab pos={pos} label={label}/>}

        {tab==="angels"&&<div>
          <div className="sectionLabel">The Seven Planetary Angels</div>
          <div style={{fontSize:11,color:"var(--ink-faint)",marginBottom:12,fontStyle:"italic"}}>From Reginald Scot, Discoverie of Witchcraft, Book XV Ch. VII (1584)</div>
          {Object.entries(ANG).map(([planet,ang])=>{const pd=PL[planet];const isOpen=selP===planet;
            return(<div key={planet} onClick={()=>sSelP(isOpen?null:planet)} className="angelRow">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:24,color:pd.c,width:30,textAlign:"center"}}>{pd.s}</span>
                <div style={{flex:1}}><div style={{fontSize:15,color:"var(--ink)"}}>{ang.a}</div><div style={{fontSize:11,color:"var(--ink-faint)"}}>{ang.rk} · {planet} · {DN[DR.indexOf(planet)]}</div></div>
                <span style={{fontSize:10,color:"var(--ink-faint)"}}>{isOpen?"▼":"▶"}</span>
              </div>
              {isOpen&&<div style={{marginTop:10,paddingLeft:40}}>
                <div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.7,marginBottom:8}}>
                  <div style={{color:pd.c,fontStyle:"italic",marginBottom:6}}>"{ang.inv}"</div>
                  <div><strong style={{color:"var(--ink-faint)"}}>Intelligence:</strong> {ang.int}</div>
                  <div><strong style={{color:"var(--ink-faint)"}}>Spirit:</strong> {ang.sp}</div>
                </div>
                <div style={{marginTop:8}}><div className="sectionLabel">Kamea (Magic Square)</div><MSq planet={planet}/></div>
              </div>}
            </div>);
          })}
          <div className="infoBox"><strong>The System:</strong> Each planet has a ruling angel, an Intelligence, and a Spirit. The Kamea generates the sigil — trace the angel's name through the grid. The character scripts in the Discoverie illustration are produced by exactly this method.</div>
        </div>}

        {tab==="circle"&&<div>
          <div className="sectionLabel">The Conjuring Circle</div>
          <div style={{fontSize:11,color:"var(--ink-faint)",marginBottom:8,fontStyle:"italic"}}>From Discoverie of Witchcraft, Book XV — "Conjuring for a Spirit"</div>
          <div style={{display:"flex",justifyContent:"center"}}><Circle/></div>
          <WoodcutDivider/>
          <div style={{marginTop:4}}>
            {DIVN.map(d=>(<div key={d.n} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:"1px solid #c4a86815"}}>
              <span style={{fontSize:11,color:"var(--gold)",width:28,textAlign:"center"}}>{d.p}</span>
              <span style={{fontSize:12,color:"var(--ink)",minWidth:100}}>{d.n}</span>
              <span style={{fontSize:10,color:"var(--ink-faint)",flex:1}}>{d.d}</span>
            </div>))}
          </div>
          <div className="infoBox"><strong>Context:</strong> Draper's sphere tells you WHEN to work. The conjuring circle tells you HOW. The operator stands at center (Magister), surrounded by divine names as authority and protection. The pentagram and concentric rings create geometric containment.</div>
        </div>}

        {tab==="hours"&&<div>
          <div className="sectionLabel">Planetary Hours — Draper's Grid</div>
          <HTable selDay={sD} onSD={sSD} selHour={sH} onSH={sSH}/>
          {selHP&&<div className="pcard" style={{borderColor:"#c4a86840"}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:30,color:PL[selHP].c}}>{PL[selHP].s}</span><div><div style={{fontSize:15,color:"var(--ink)"}}>{selHP} · {ANG[selHP]?ANG[selHP].a:""}</div><div style={{fontSize:11,color:"var(--ink-faint)"}}>{DN[sD]} · Hour {sH} · {PL[selHP].m}</div><div style={{fontSize:11,color:"var(--ink-light)",marginTop:4}}>{PL[selHP].d}</div>{ANG[selHP]&&<div style={{fontSize:11,color:PL[selHP].c,marginTop:4,fontStyle:"italic"}}>Intelligence: {ANG[selHP].int} · Spirit: {ANG[selHP].sp}</div>}</div></div></div>}
          {!selHP&&<div className="infoBox"><strong>Tap any cell</strong> — each hour shows planet, angel, intelligence, and spirit.</div>}
        </div>}

        {tab==="cipher"&&<div>
          <div className="sectionLabel">Renaissance Cryptography</div>
          <div style={{fontSize:11,color:"var(--ink-faint)",marginBottom:12,fontStyle:"italic"}}>Giambattista della Porta, De Occultis Literarum Notis (1592)</div>
          {CIPH.map((c,i)=>(<div key={i} style={{padding:"10px 0",borderBottom:"1px solid #c4a86820"}}>
            <div style={{fontSize:14,color:"var(--gold)",marginBottom:4}}>{c.n}</div>
            <div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.6}}>{c.d}</div>
            <div style={{fontSize:10,color:"var(--ink-faint)",marginTop:4,fontStyle:"italic"}}>{c.f}</div>
          </div>))}
          <div className="infoBox"><strong>The Connection:</strong> Della Porta published De Furtivis in 1563 — two years after Draper carved his sphere. The angelic "characters" in Scot's Chapter VII ARE a cipher: each sigil is generated by tracing an angel's name through the planetary magic square.</div>
          <div className="infoBox"><strong>Sources for Your Cluster:</strong><div style={{marginTop:4,color:"var(--ink-light)"}}>
            <div>Discoverie of Witchcraft — gutenberg.org/ebooks/60766</div>
            <div>De Occultis — archive.org/details/de-occultis-literarum-notis-seu-artis</div>
            <div>De Furtivis — archive.org/details/bub_gb_sc-Zaq8_jFIC</div>
          </div></div>
        </div>}

        <WoodcutDivider/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><CornerOrnament/><CornerOrnament flip/></div>
        <div style={{fontSize:9,color:"var(--ink-faint)",textAlign:"center",lineHeight:1.8,marginTop:-8,opacity:0.6}}>
          Ephemeris: Swiss Ephemeris DE431 · Angels: Scot (1584) & Agrippa (1533)<br/>
          "Hew Draper of Brystow made thys spheer the 30 daye of Maye anno 1561"
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
