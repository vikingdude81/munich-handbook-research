/* ══════════════════════════════════════════════════════════════════
   SVG — MAGIC CIRCLE
   ══════════════════════════════════════════════════════════════════ */

function spiritPos(idx, total, r, cx, cy) {
  /* Spirits placed in their sector. 3 spirits per sector, 4 sectors.
     Within each sector: 3 positions at sector_start + 30°, 60°, 90° */
  const sectorIdx = Math.floor(idx / 3);
  const posInSector = idx % 3;
  const sectorStart = sectorIdx * 90 - 90; // top = -90°
  const angle = (sectorStart + 15 + posInSector * 30) * Math.PI / 180;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle), angle };
}

function MagicCircle({ selectedSpirit, highlightSpirit, showResonances, onClickSpirit }) {
  const size = 400, cx = size / 2, cy = size / 2;
  const outerR = 185, ringR = 148, coreR = 38;
  const nodeR = 14;

  /* Pre-compute positions */
  const positions = {};
  SPIRITS.forEach((s, i) => {
    positions[s.name] = spiritPos(i, SPIRITS.length, ringR, cx, cy);
  });

  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width:"100%", maxWidth:400 }}>
      <defs>
        <radialGradient id="gc">
          <stop offset="0%" stopColor="#1a0820"/>
          <stop offset="100%" stopColor="#080510"/>
        </radialGradient>
        <radialGradient id="gcore">
          <stop offset="0%" stopColor="#C5960A22"/>
          <stop offset="100%" stopColor="transparent"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowB">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Background */}
      <circle cx={cx} cy={cy} r={outerR+10} fill="url(#gc)"/>

      {/* Outer decorative ring — degree ticks */}
      {Array.from({length:72}, (_,i) => {
        const a = (i * 5 - 90) * Math.PI / 180;
        const r1 = outerR + 1, r2 = outerR + (i % 18 === 0 ? 9 : i % 6 === 0 ? 5 : 2.5);
        return <line key={i}
          x1={cx + r1*Math.cos(a)} y1={cy + r1*Math.sin(a)}
          x2={cx + r2*Math.cos(a)} y2={cy + r2*Math.sin(a)}
          stroke={i % 18 === 0 ? "#3a2a1a" : "#1e1218"} strokeWidth={i % 18 === 0 ? 1.2 : 0.5}/>;
      })}

      {/* Rings */}
      <circle cx={cx} cy={cy} r={outerR} fill="none" stroke="#2a1a2a" strokeWidth="1.5"/>
      <circle cx={cx} cy={cy} r={ringR+nodeR+4} fill="none" stroke="#1a0a1a" strokeWidth="0.5" strokeDasharray="4,8"/>
      <circle cx={cx} cy={cy} r={coreR} fill="url(#gcore)" stroke="#2a1a1a" strokeWidth="0.8"/>

      {/* Sector dividers — 4 quadrant lines */}
      {[0,90,180,270].map(deg => {
        const a = (deg - 90) * Math.PI / 180;
        return <line key={deg}
          x1={cx + coreR*Math.cos(a)} y1={cy + coreR*Math.sin(a)}
          x2={cx + (ringR+nodeR+6)*Math.cos(a)} y2={cy + (ringR+nodeR+6)*Math.sin(a)}
          stroke="#1e1020" strokeWidth="0.7" strokeDasharray="3,5"/>;
      })}

      {/* Sector arc labels (outside ring) */}
      {SECTOR_LABELS.map((label, si) => {
        const midAngle = (si * 90 + 45 - 90) * Math.PI / 180;
        const r = outerR - 10;
        return <text key={si}
          x={cx + r*Math.cos(midAngle)} y={cy + r*Math.sin(midAngle)}
          textAnchor="middle" dominantBaseline="central"
          fill={SECTOR_COLORS[si]} fontSize="6.5" opacity="0.55"
          style={{ fontFamily:"'Cormorant Garamond',serif", letterSpacing:0.5 }}>
          {label}
        </text>;
      })}

      {/* Hexagram in center */}
      {[0,60,120,180,240,300].map((deg,i) => {
        const a = (deg - 90) * Math.PI / 180, r = coreR - 8;
        const next = ((deg + 120) - 90) * Math.PI / 180;
        return <line key={i}
          x1={cx + r*Math.cos(a)} y1={cy + r*Math.sin(a)}
          x2={cx + r*Math.cos(next)} y2={cy + r*Math.sin(next)}
          stroke="#C5960A" strokeWidth="0.6" opacity="0.35"/>;
      })}
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="central"
        fill="#C5960A" fontSize="14" opacity="0.4" style={{ fontFamily:"serif" }}>⊕</text>

      {/* Resonance lines */}
      {showResonances && RESONANCES.map((res, i) => {
        const p1 = positions[res.s1], p2 = positions[res.s2];
        if (!p1 || !p2) return null;
        const isHL = selectedSpirit === res.s1 || selectedSpirit === res.s2
                  || highlightSpirit === res.s1 || highlightSpirit === res.s2;
        return <line key={i}
          x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
          stroke={res.color}
          strokeWidth={isHL ? 1.8 : 0.7}
          opacity={isHL ? 0.7 : 0.2}
          strokeDasharray={res.dash ? "3,3" : "none"}/>;
      })}

      {/* Spirit nodes — CLICKABLE */}
      {SPIRITS.map((s, i) => {
        const pos = positions[s.name];
        const court = COURTS[s.court];
        const isSel = selectedSpirit === s.name;
        const isHL = highlightSpirit === s.name;
        const sz = Math.max(11, Math.min(17, 9 + s.occurrences * 0.35));
        const shortName = s.name.length > 7 ? s.name.slice(0,6) : s.name;
        return (
          <g key={s.name} onClick={() => onClickSpirit(s.name)}
            filter={isSel || isHL ? "url(#glowB)" : "url(#glow)"}
            style={{ cursor:"pointer" }}>
            <circle cx={pos.x} cy={pos.y} r={sz + (isSel ? 4 : 0)}
              fill="#080510" stroke={court.color}
              strokeWidth={isSel ? 2.5 : isHL ? 1.8 : 1}/>
            <text x={pos.x} y={pos.y - 1} textAnchor="middle" dominantBaseline="central"
              fill={court.color} fontSize={isSel ? 8 : 7}
              style={{ fontFamily:"'Cormorant Garamond',serif", fontWeight:"600", pointerEvents:"none" }}>
              {shortName}
            </text>
            {/* Occurrence dot band */}
            <circle cx={pos.x} cy={pos.y} r={sz + 3}
              fill="none" stroke={court.color} strokeWidth="0.4"
              opacity={isSel ? 0.5 : 0.15}
              strokeDasharray={`${s.occurrences * 0.6},100`}/>
          </g>
        );
      })}

      {/* Center label */}
      <text x={cx} y={cy - 16} textAnchor="middle" fill="#3a2a3a" fontSize="5.5"
        style={{ fontFamily:"'Cormorant Garamond',serif", letterSpacing:2 }}>
        CLM 849
      </text>
      <text x={cx} y={cy + 18} textAnchor="middle" fill="#4a3a3a" fontSize="5"
        style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic" }}>
        Tap spirits for detail
      </text>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════════════

function SpiritCard({ name }) {
  const s = SPIRITS.find(x => x.name === name);
  if (!s) return null;
  const court = COURTS[s.court];
  const coSpirits = s.co_invoked.filter(n => SPIRITS.find(x => x.name === n));
  return (
    <div style={{ background:"#0e080e", border:`1px solid ${court.color}40`,
      padding:"14px", marginTop:10, borderLeft:`3px solid ${court.color}` }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
        <div style={{ fontSize:32, color:court.color, lineHeight:1, paddingTop:4 }}>{court.symbol}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:20, color:"#e8d5b5", fontWeight:400 }}>{s.name}</div>
          <div style={{ fontSize:11, color:court.color, marginTop:1 }}>{s.rank}</div>
          <div style={{ fontSize:10, color:"#3a2a3a", marginTop:1 }}>
            {court.label} · {s.occurrences} occurrences · Planet: {s.planet}
          </div>
        </div>
        <div style={{ textAlign:"right", fontSize:10 }}>
          <div style={{ color:"#3a2a3a" }}>Direction</div>
          <div style={{ color:"#6a5a5a" }}>{s.direction}</div>
        </div>
      </div>

      <div style={{ marginTop:10, fontSize:12, color:"#8a7a6a", lineHeight:1.7 }}>{s.function}</div>

      <div style={{ marginTop:10, padding:"8px 10px", background:"#0a050a",
        border:"1px solid #1a0a1a", fontSize:11, color:"#7a6a5a",
        fontStyle:"italic", lineHeight:1.6 }}>
        "{s.quote}"
      </div>

      <div style={{ marginTop:10, display:"flex", flexWrap:"wrap", gap:6 }}>
        {s.experiments.map((e, i) => (
          <span key={i} style={{ fontSize:9, color:court.color,
            border:`1px solid ${court.color}40`, padding:"2px 6px" }}>
            {e}
          </span>
        ))}
      </div>

      <div style={{ marginTop:8, paddingTop:8, borderTop:"1px solid #1a0a1a",
        fontSize:10, color:"#3a2a3a" }}>
        {s.page_refs}
      </div>

      {coSpirits.length > 0 && (
        <div style={{ marginTop:8, paddingTop:8, borderTop:"1px solid #1a0a1a",
          fontSize:10, color:"#5a4a4a" }}>
          Co-invoked with: {s.co_invoked.join(", ")}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   SPIRITS TABLE
   ══════════════════════════════════════════════════════════════════ */

function SpiritTable({ onSelect, selected, onHover }) {
  return (
    <div>
      {SPIRITS.map(s => {
        const court = COURTS[s.court];
        const isSel = selected === s.name;
        return (
          <div key={s.name}
            onMouseEnter={() => onHover(s.name)}
            onMouseLeave={() => onHover(null)}
            onClick={() => onSelect(s.name)}
            style={{ display:"flex", alignItems:"center", gap:10,
              padding:"8px 4px", borderBottom:"1px solid #130813",
              cursor:"pointer", background: isSel ? "#0e080e" : "transparent" }}>
            <span style={{ fontSize:18, color:court.color, width:24, textAlign:"center" }}>
              {court.symbol}
            </span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, color:"#e0ccb5" }}>{s.name}</div>
              <div style={{ fontSize:10, color:"#5a4a4a" }}>
                {s.rank} · {s.occurrences} refs
              </div>
            </div>
            <div style={{ textAlign:"right", fontSize:10 }}>
              <div style={{ color:court.color }}>{court.label}</div>
              <div style={{ color:"#4a3a4a" }}>♃ {s.planet}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

    <div>
      <div style={{ fontSize:10, color:"#3a2a3a", marginBottom:10, lineHeight:1.7 }}>
        All connections verified from CLM 849. Solid lines = direct co-invocation in same ritual.
        Dashed lines = co-inscription in same circle formula.
      </div>
      {RESONANCES.map((r, i) => {
        const s1 = SPIRITS.find(x => x.name === r.s1);
        const s2 = SPIRITS.find(x => x.name === r.s2);
        if (!s1 || !s2) return null;
        return (
          <div key={i}
            onMouseEnter={() => onHover(r.s1)}
            onMouseLeave={() => onHover(null)}
            style={{ display:"flex", gap:8, alignItems:"center",
              padding:"7px 2px", borderBottom:"1px solid #130813" }}>
            <span style={{ color:COURTS[s1.court].color, fontSize:13, width:20, textAlign:"center" }}>
              {COURTS[s1.court].symbol}
            </span>
            <div style={{ color:r.color, fontSize:10, width:16, textAlign:"center" }}>
              {r.dash ? "╌╌" : "──"}
            </div>
            <span style={{ color:COURTS[s2.court].color, fontSize:13, width:20, textAlign:"center" }}>
              {COURTS[s2.court].symbol}
            </span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, color:"#8a7a6a" }}>
                {r.s1} <span style={{ color:r.color }}>{r.type}</span> {r.s2}
              </div>
              <div style={{ fontSize:10, color:"#4a3a4a", marginTop:1 }}>{r.desc}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   HOURS TABLE (Planetary hours for conjuration timing)
   ══════════════════════════════════════════════════════════════════ */

function HoursTable({ selDay, onSelDay, selHour, onSelHour }) {
  return (
    <div style={{ overflowX:"auto" }}>
      <div style={{ fontSize:10, color:"#3a2a3a", marginBottom:8, lineHeight:1.7 }}>
        Chaldean planetary hours for timing conjurations. Day hours (6–18) operate in full power.
        Each cell shows the ruling planet; tap for conjuration guidance from CLM 849.
      </div>
      <table style={{ borderCollapse:"collapse", width:"100%", fontSize:10,
        fontFamily:"'Cormorant Garamond',serif" }}>
        <thead>
          <tr>
            <th style={{ ...thS, width:22 }}></th>
            {DAY_NAMES.map((d, i) => (
              <th key={d} onClick={() => onSelDay(i)}
                style={{ ...thS, cursor:"pointer",
                  background: selDay === i ? "#1a0a1a" : "transparent",
                  color: selDay === i ? "#C5960A" : "#3a2a3a" }}>
                {d.slice(0,2)}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {Array.from({length:24}, (_, h) => (
            <tr key={h}>
              <td style={{ ...tdS, color:"#2a2a2a", fontWeight:600, fontSize:8 }}>{h}</td>
              {Array.from({length:7}, (_, di) => {
                const planet = CHALDEAN[(CHALDEAN.indexOf(DAY_RULERS[di]) + h) % 7];
                const pd = PLANETS[planet];
                const isSel = selDay === di && selHour === h;
                return (
                  <td key={di} onClick={() => { onSelDay(di); onSelHour(h); }}
                    style={{ ...tdS, cursor:"pointer", fontSize:14,
                      background: isSel ? "#1a0a1a" : "transparent",
                      color: pd.color, opacity: (h >= 6 && h < 18) ? 1 : 0.3 }}
                    title={planet}>
                    {pd.symbol}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}
const thS = { padding:"3px", borderBottom:"1px solid #1a0a1a", textAlign:"center", fontWeight:600 };
const tdS = { padding:"1px 0", borderBottom:"1px solid #08050820", textAlign:"center" };

/* ══════════════════════════════════════════════════════════════════

    color: "#DAA520",

  },
  {

    som_cell: "Cell (0,3)"

  {

function CourtsView() {
  const [openCourt, setOpenCourt] = useState(null);
  return (
    <div>
      <div style={{ fontSize:10, color:"#3a2a3a", marginBottom:10, lineHeight:1.7 }}>
        Infernal Courts computed from SOM clustering on 6D feature vectors
        (Rank, Info, Kinetic, Social, Treasure, Legion utility). Four courts
        emerge from the 4×4 SOM grid. Source: verified Table D seed spirits.
      </div>
      {INFERNAL_COURTS.map((court, i) => {
        const isOpen = openCourt === i;
        return (
          <div key={i} onClick={() => setOpenCourt(isOpen ? null : i)}
            style={{ marginBottom:6, border:`1px solid ${court.color}30`,
              borderLeft:`3px solid ${court.color}`, cursor:"pointer" }}>
            <div style={{ padding:"10px 12px", display:"flex", gap:10, alignItems:"center" }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, color:"#e0ccb5" }}>{court.name}</div>
                <div style={{ fontSize:10, color:"#5a4a4a", marginTop:2 }}>
                  {court.spirits.join(" · ")} · {court.som_cell}
                </div>
              </div>
              <div style={{ color:court.color, fontSize:12 }}>{isOpen ? "▲" : "▼"}</div>
            </div>
            {isOpen && (
              <div style={{ padding:"0 12px 12px", borderTop:`1px solid ${court.color}20` }}>
                <div style={{ fontSize:12, color:"#7a6a5a", lineHeight:1.7, marginTop:8 }}>
                  {court.desc}
                </div>
                <div style={{ marginTop:8, display:"flex", gap:6, flexWrap:"wrap" }}>
                  {court.spirits.map(name => {
                    const s = SPIRITS.find(x => x.name === name);
                    return s ? (
                      <span key={name} style={{ fontSize:9, color:court.color,
                        border:`1px solid ${court.color}50`, padding:"2px 6px" }}>
                        {court.name === "Court of Revelation"
                          ? `${name} (Info: ${name === "Astaroth" ? "0.9" : name === "Berith" ? "0.8" : "0.9"})`
                          : name}
                      </span>
                    ) : null;
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════════════════════ */

function InfernalTopology() {
  const [tab, setTab] = useState("circle");
  const [selectedSpirit, setSelectedSpirit] = useState(null);
  const [highlightSpirit, setHighlightSpirit] = useState(null);
  const [showResonances, setShowResonances] = useState(true);
  const [selDay, setSelDay] = useState(null);
  const [selHour, setSelHour] = useState(null);

  const handleClickSpirit = (name) => {
    setSelectedSpirit(selectedSpirit === name ? null : name);
  };

  const selHourPlanet = selDay !== null && selHour !== null
    ? CHALDEAN[(CHALDEAN.indexOf(DAY_RULERS[selDay]) + selHour) % 7]
    : null;

  const TABS = [["circle","Circle"],["spirits","Spirits"],["courts","Courts"],["rituals","Resonances"],["hours","Hours"]];

  return (
    <div style={{ background:"#080510", color:"#e0ccb5", minHeight:"100vh",
      padding:"20px 12px", fontFamily:"'Cormorant Garamond',serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>

      <div style={{ maxWidth:480, margin:"0 auto" }}>

        {/* ── Header ── */}
        <div style={{ textAlign:"center", marginBottom:16 }}>
          <div style={{ fontSize:8, color:"#2a1a2a", letterSpacing:6, textTransform:"uppercase" }}>
            Infernal Topology Research
          </div>
          <h1 style={{ margin:"4px 0 2px", fontSize:20, fontWeight:400,
            color:"#C5960A", letterSpacing:1 }}>
            Munich Handbook of Necromancy

          <div style={{ fontSize:11, color:"#3a2a3a", fontStyle:"italic" }}>
            CLM 849 · Bayerische Staatsbibliothek · c. 1440–60
          </div>
        </div>

        {/* ── Status banner ── */}
        <div style={{ background:"#0e080e", border:"1px solid #1a0a1a",
          padding:"8px 12px", margin:"0 0 12px",
          display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:9, color:"#3a2a3a", textTransform:"uppercase", letterSpacing:2 }}>Corpus</div>
            <div style={{ fontSize:12, color:"#8a7a6a" }}>
              {SPIRITS.length} verified spirits · {RESONANCES.length} co-invocations · 4 Infernal Courts
            </div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:"#3a2a3a" }}>Source</div>
            <div style={{ fontSize:11, color:"#5a4a4a" }}>Kieckhefer (1997)</div>
          </div>
        </div>

        {/* ── Tabs ── */}
        <div style={{ display:"flex", gap:0, marginBottom:12,
          borderBottom:"1px solid #1a0a1a", overflowX:"auto" }}>
          {TABS.map(([k, l]) => (
            <button key={k} onClick={() => { setTab(k); setSelectedSpirit(null); }}
              style={{ flex:1, padding:"6px 4px", background:"none", border:"none",
                borderBottom: tab === k ? "2px solid #C5960A" : "2px solid transparent",
                color: tab === k ? "#e0ccb5" : "#3a2a3a",
                fontFamily:"'Cormorant Garamond',serif", fontSize:11,
                cursor:"pointer", letterSpacing:0.5, whiteSpace:"nowrap" }}>
              {l}
            </button>
          ))}
        </div>

        {/* ── CIRCLE ── */}
        {tab === "circle" && (
          <div>
            <MagicCircle
              selectedSpirit={selectedSpirit}
              highlightSpirit={highlightSpirit}
              showResonances={showResonances}
              onClickSpirit={handleClickSpirit}/>

            <div style={{ display:"flex", gap:16, justifyContent:"center", margin:"6px 0 10px" }}>
              <label style={{ fontSize:11, color:"#5a4a5a", cursor:"pointer",
                display:"flex", alignItems:"center", gap:4 }}>
                <input type="checkbox" checked={showResonances}
                  onChange={() => setShowResonances(!showResonances)}
                  style={{ accentColor:"#C5960A" }}/> Resonances
              </label>
            </div>

            {/* Sector legend */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"3px 10px",
              marginBottom:10 }}>
              {SECTOR_LABELS.map((label, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%",
                    background:SECTOR_COLORS[i], opacity:0.7, flexShrink:0 }}/>
                  <span style={{ color:"#5a4a5a" }}>{label}</span>
                </div>
              ))}
            </div>

            {/* Spirit click detail */}
            {selectedSpirit && <SpiritCard name={selectedSpirit}/>}

            {/* Spirit legend */}
            {!selectedSpirit && (
              <div>
                <div style={{ fontSize:10, color:"#2a1a2a", marginBottom:6,
                  textTransform:"uppercase", letterSpacing:2 }}>Spirits</div>

                  {SPIRITS.map(s => {
                    const court = COURTS[s.court];
                    return (
                      <div key={s.name}
                        onMouseEnter={() => setHighlightSpirit(s.name)}
                        onMouseLeave={() => setHighlightSpirit(null)}
                        onClick={() => handleClickSpirit(s.name)}
                        style={{ display:"flex", alignItems:"center", gap:5,
                          fontSize:11, cursor:"pointer", padding:"2px 0" }}>
                        <span style={{ color:court.color, fontSize:14, width:18 }}>
                          {court.symbol}

                        <span style={{ color:"#6a5a5a" }}>{s.name}</span>
                        <span style={{ color:"#2a1a2a", marginLeft:"auto", fontSize:9 }}>

        {tab === "spirits" && (
          <div>
            <div style={{ fontSize:10, color:"#3a2a3a", marginBottom:10,
              textTransform:"uppercase", letterSpacing:2 }}>
              Verified Spirit Roster — tap for detail
            </div>
            <SpiritTable
              selected={selectedSpirit}
              onSelect={handleClickSpirit}
              onHover={setHighlightSpirit}/>

        {/* ── COURTS ── */}
        {tab === "courts" && (
          <div>
            <div style={{ fontSize:10, color:"#3a2a3a", marginBottom:10,
              textTransform:"uppercase", letterSpacing:2 }}>
              Infernal Courts — SOM Cluster Analysis

            <CourtsView/>
            <div style={{ marginTop:14, padding:"10px 12px", background:"#0e080e",
              border:"1px solid #1a0a1a", fontSize:12, color:"#5a4a4a", lineHeight:1.7 }}>
              <strong style={{ color:"#C5960A" }}>Method:</strong> 11 verified Table D seed spirits

              MiniSom 4×4 topology trained with QRNG seeding. Four stable cluster regions

              Note: only the 11 seed spirits are verified; courts inferred from their SOM placement.

          </div>

        {/* ── RESONANCES ── */}
        {tab === "rituals" && (
          <div>

              Co-Invocation Resonances

            <ResonanceTable onHover={setHighlightSpirit}/>

        )}

        {/* ── HOURS ── */}
        {tab === "hours" && (
          <div>
            <div style={{ fontSize:10, color:"#3a2a3a", marginBottom:10,
              textTransform:"uppercase", letterSpacing:2 }}>

            <HoursTable selDay={selDay} onSelDay={setSelDay}
              selHour={selHour} onSelHour={setSelHour}/>
            {selHourPlanet && (
              <div style={{ background:"#0e080e", border:"1px solid #1a0a1a",
                padding:"12px 14px", marginTop:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <span style={{ fontSize:36, color:PLANETS[selHourPlanet].color }}>
                    {PLANETS[selHourPlanet].symbol}
                  </span>
                  <div>
                    <div style={{ fontSize:16, color:"#e0ccb5" }}>
                      {selHourPlanet} · {DAY_NAMES[selDay]} · Hour {selHour}
                    </div>
                    <div style={{ fontSize:11, color:"#5a4a4a", marginTop:4,
                      lineHeight:1.6 }}>
                      <strong style={{ color:"#7a6a5a" }}>Conjure:</strong>{" "}
                      {PLANETS[selHourPlanet].conjure}
                    </div>
                  </div>
                </div>
              </div>
            )}
            {!selHourPlanet && (
              <div style={{ background:"#0e080e", border:"1px solid #1a0a1a",
                padding:"12px 14px", marginTop:10, fontSize:12, color:"#4a3a4a",
                lineHeight:1.7 }}>
                <strong style={{ color:"#C5960A" }}>How to use:</strong> Each day's first hour
                belongs to its ruling planet (Sunday → ☉). Subsequent hours cycle the Chaldean
                order: ♄→♃→♂→☉→♀→☿→☽. The Munich Handbook specifies planetary-hour timing
                for major conjurations. Day hours (6–18) shown at full opacity; night hours dimmed.
                Tap any cell.
              </div>
            )}
          </div>
        )}

        {/* ── Footer ── */}
        <div style={{ marginTop:28, paddingTop:12, borderTop:"1px solid #130813",
          fontSize:9, color:"#1e1220", textAlign:"center", lineHeight:2 }}>
          All data extracted from CLM 849 via Kieckhefer, <em>Forbidden Rites</em> (Penn State, 1997)
          <br/>
          Distillation: gemma-4-26b via LM Studio · 160 grimoire chunks (215 total distilled) · munich-handbook-research
          <br/>
          No hallucinated spirits — verified provenance only
        </div>

      </div>
    </div>
  );
}

ReactDOM.render(<InfernalTopology/>, document.getElementById("root"));
  </script>
</body>
